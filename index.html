<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>小熊猫历险记 - 语文数学学习</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .game-container {
            max-width: 480px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
        }
        
        /* 顶部状态栏 */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 12px 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .stat {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 16px;
            font-weight: bold;
            color: #333;
        }
        
        .stat-icon {
            font-size: 24px;
        }
        
        .star-icon { color: #ffd700; }
        .coin-icon { color: #ff9f43; }
        .heart-icon { color: #ff6b6b; }
        
        /* 熊猫角色 */
        .panda-container {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .panda {
            width: 120px;
            height: 120px;
            margin: 0 auto;
            position: relative;
            animation: bounce 2s ease-in-out infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .panda-body {
            width: 100px;
            height: 90px;
            background: white;
            border-radius: 50px 50px 45px 45px;
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: inset -10px -10px 20px rgba(0,0,0,0.05);
        }
        
        .panda-head {
            width: 80px;
            height: 75px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
        }
        
        .panda-ear {
            width: 30px;
            height: 30px;
            background: #333;
            border-radius: 50%;
            position: absolute;
            top: -5px;
        }
        
        .panda-ear.left { left: 5px; }
        .panda-ear.right { right: 5px; }
        
        .panda-eye {
            width: 20px;
            height: 24px;
            background: #333;
            border-radius: 50%;
            position: absolute;
            top: 25px;
        }
        
        .panda-eye.left { left: 15px; }
        .panda-eye.right { right: 15px; }
        
        .panda-eye::after {
            content: '';
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 4px;
            left: 4px;
        }
        
        .panda-nose {
            width: 12px;
            height: 10px;
            background: #333;
            border-radius: 50% 50% 40% 40%;
            position: absolute;
            top: 45px;
            left: 50%;
            transform: translateX(-50%);
        }
        
        .panda-mouth {
            width: 20px;
            height: 10px;
            border: 3px solid #333;
            border-top: none;
            border-radius: 0 0 20px 20px;
            position: absolute;
            top: 52px;
            left: 50%;
            transform: translateX(-50%);
        }
        
        .panda-blush {
            width: 15px;
            height: 10px;
            background: rgba(255,150,150,0.5);
            border-radius: 50%;
            position: absolute;
            top: 50px;
        }
        
        .panda-blush.left { left: 5px; }
        .panda-blush.right { right: 5px; }
        
        /* 熊猫装扮 */
        .panda-hat {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 40px;
        }
        
        .level-badge {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            margin-top: 10px;
            display: inline-block;
        }
        
        /* 开始页面 */
        .screen {
            display: none;
        }
        
        .screen.active {
            display: block;
        }
        
        .start-screen {
            text-align: center;
            padding-top: 40px;
        }
        
        .game-title {
            font-size: 32px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 10px;
        }
        
        .game-subtitle {
            font-size: 16px;
            color: rgba(255,255,255,0.9);
            margin-bottom: 40px;
        }
        
        .start-btn {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            border: none;
            padding: 18px 60px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(17,153,142,0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .start-btn:active {
            transform: scale(0.95);
        }
        
        .subject-cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 30px;
        }
        
        .subject-card {
            background: white;
            border-radius: 20px;
            padding: 25px 20px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        
        .subject-card:active {
            transform: scale(0.95);
        }
        
        .subject-icon {
            font-size: 50px;
            margin-bottom: 10px;
        }
        
        .subject-name {
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }
        
        .math-card {
            border: 3px solid #667eea;
        }
        
        .chinese-card {
            border: 3px solid #f5576c;
        }
        
        /* 答题页面 */
        .quiz-screen {
            background: white;
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }
        
        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .back-btn {
            background: #f0f0f0;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
        }
        
        .quiz-type {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
        }
        
        .question-container {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .question-type {
            font-size: 14px;
            color: #999;
            margin-bottom: 15px;
        }
        
        .question-text {
            font-size: 36px;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
        }
        
        .question-hint {
            font-size: 16px;
            color: #666;
            background: #f8f8f8;
            padding: 10px 20px;
            border-radius: 10px;
            display: inline-block;
        }
        
        /* 选项 */
        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .option-btn {
            background: white;
            border: 3px solid #e0e0e0;
            padding: 20px;
            font-size: 28px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .option-btn:active {
            transform: scale(0.95);
        }
        
        .option-btn.correct {
            background: #38ef7d;
            border-color: #11998e;
            color: white;
            animation: pulse 0.5s;
        }
        
        .option-btn.wrong {
            background: #ff6b6b;
            border-color: #ee5a5a;
            color: white;
            animation: shake 0.5s;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        
        /* 进度条 */
        .progress-bar {
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
        }
        
        .progress-text {
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
            color: #999;
        }
        
        /* 结果页面 */
        .result-screen {
            text-align: center;
            padding-top: 20px;
        }
        
        .result-panda {
            font-size: 80px;
            margin-bottom: 20px;
            animation: bounce 1s ease-in-out infinite;
        }
        
        .result-title {
            font-size: 28px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }
        
        .result-stats {
            background: #f8f8f8;
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
        }
        
        .stat-row {
            display: flex;
            justify-content: space-around;
            margin-bottom: 15px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-label {
            font-size: 14px;
            color: #999;
        }
        
        .result-buttons {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        
        .result-btn {
            flex: 1;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 15px;
            cursor: pointer;
        }
        
        .continue-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .home-btn {
            background: #f0f0f0;
            color: #333;
        }
        
        /* 奖励动画 */
        .reward-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: white;
            padding: 30px;
            border-radius: 30px;
            text-align: center;
            z-index: 100;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            transition: transform 0.3s;
        }
        
        .reward-popup.show {
            transform: translate(-50%, -50%) scale(1);
        }
        
        .reward-icon {
            font-size: 80px;
            margin-bottom: 15px;
        }
        
        .reward-text {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }
        
        .reward-detail {
            font-size: 16px;
            color: #666;
            margin-top: 10px;
        }
        
        /* 底部导航 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 15px;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.1);
        }
        
        .nav-item {
            text-align: center;
            cursor: pointer;
        }
        
        .nav-icon {
            font-size: 28px;
            margin-bottom: 5px;
        }
        
        .nav-text {
            font-size: 12px;
            color: #666;
        }
        
        /* 成就徽章 */
        .achievement {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            margin: 5px;
        }
        
        .achievements-list {
            margin-top: 15px;
        }
        
        /* 覆盖层 */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 99;
            display: none;
        }
        
        .overlay.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- 顶部状态栏 -->
        <div class="top-bar" id="topBar">
            <div class="stat">
                <span class="stat-icon star-icon">⭐</span>
                <span id="stars">0</span>
            </div>
            <div class="stat">
                <span class="stat-icon coin-icon">🪙</span>
                <span id="coins">0</span>
            </div>
            <div class="stat">
                <span class="stat-icon heart-icon">❤️</span>
                <span id="hearts">3</span>
            </div>
        </div>
        
        <!-- 开始页面 -->
        <div class="screen start-screen active" id="startScreen">
            <h1 class="game-title">🐼 小熊猫历险记</h1>
            <p class="game-subtitle">边玩边学，趣味成长</p>
            
            <div class="panda-container">
                <div class="panda">
                    <div class="panda-head">
                        <div class="panda-ear left"></div>
                        <div class="panda-ear right"></div>
                        <div class="panda-eye left"></div>
                        <div class="panda-eye right"></div>
                        <div class="panda-nose"></div>
                        <div class="panda-mouth"></div>
                        <div class="panda-blush left"></div>
                        <div class="panda-blush right"></div>
                    </div>
                    <div class="panda-body"></div>
                    <div class="panda-hat">🎓</div>
                </div>
                <div class="level-badge">Lv.1 小学新生</div>
            </div>
            
            <button class="start-btn" onclick="showSubjectSelect()">开始学习</button>
            
            <div class="subject-cards" style="display:none" id="subjectCards">
                <div class="subject-card math-card" onclick="startQuiz('math')">
                    <div class="subject-icon">🔢</div>
                    <div class="subject-name">数学</div>
                </div>
                <div class="subject-card chinese-card" onclick="startQuiz('chinese')">
                    <div class="subject-icon">📚</div>
                    <div class="subject-name">语文</div>
                </div>
            </div>
        </div>
        
        <!-- 答题页面 -->
        <div class="screen" id="quizScreen">
            <div class="quiz-screen">
                <div class="quiz-header">
                    <button class="back-btn" onclick="goHome()">← 返回</button>
                    <div class="quiz-type" id="quizType">数学</div>
                </div>
                
                <div class="question-container">
                    <div class="question-type" id="questionType">请选择正确答案</div>
                    <div class="question-text" id="questionText">1 + 1 = ?</div>
                    <div class="question-hint" id="questionHint">提示：掰手指算一算</div>
                </div>
                
                <div class="options" id="options">
                    <button class="option-btn">2</button>
                    <button class="option-btn">3</button>
                    <button class="option-btn">4</button>
                    <button class="option-btn">5</button>
                </div>
                
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                </div>
                <div class="progress-text" id="progressText">第 1/10 题</div>
            </div>
        </div>
        
        <!-- 结果页面 -->
        <div class="screen result-screen" id="resultScreen">
            <div class="result-panda" id="resultPanda">🎉</div>
            <div class="result-title" id="resultTitle">太棒了！</div>
            
            <div class="result-stats">
                <div class="stat-row">
                    <div class="stat-item">
                        <div class="stat-value" id="correctCount">8</div>
                        <div class="stat-label">正确</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="wrongCount">2</div>
                        <div class="stat-label">错误</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="accuracy">80%</div>
                        <div class="stat-label">正确率</div>
                    </div>
                </div>
            </div>
            
            <div class="achievements-list" id="achievements"></div>
            
            <div class="result-buttons">
                <button class="result-btn continue-btn" onclick="continueQuiz()">继续答题</button>
                <button class="result-btn home-btn" onclick="goHome()">返回主页</button>
            </div>
        </div>
    </div>
    
    <!-- 奖励弹窗 -->
    <div class="overlay" id="overlay"></div>
    <div class="reward-popup" id="rewardPopup">
        <div class="reward-icon" id="rewardIcon">🎉</div>
        <div class="reward-text" id="rewardText">太棒了！</div>
        <div class="reward-detail" id="rewardDetail">+10 ⭐</div>
    </div>
    
    <script>
        // 游戏状态
        let state = {
            stars: 0,
            coins: 0,
            hearts: 3,
            level: 1,
            currentSubject: 'math',
            currentQuestion: 0,
            totalQuestions: 10,
            correctAnswers: 0,
            wrongAnswers: 0,
            streak: 0,
            achievements: []
        };
        
        // 数学题库
        const mathQuestions = [
            // 10以内加法
            { a: 1, b: 1, op: '+', hint: '1个苹果加1个苹果' },
            { a: 2, b: 3, op: '+', hint: '2只小兔子加3只' },
            { a: 4, b: 5, op: '+', hint: '4颗糖加5颗糖' },
            { a: 3, b: 6, op: '+', hint: '3朵花加6朵花' },
            { a: 7, b: 2, op: '+', hint: '7颗星星加2颗' },
            // 10以内减法
            { a: 8, b: 3, op: '-', hint: '8个橘子吃掉3个' },
            { a: 9, b: 4, op: '-', hint: '9只鸟飞走4只' },
            { a: 6, b: 2, op: '-', hint: '6块饼干吃掉2块' },
            { a: 10, b: 5, op: '-', hint: '10个气球爆了5个' },
            // 20以内加法
            { a: 12, b: 5, op: '+', hint: '12个苹果再加5个' },
            { a: 8, b: 7, op: '+', hint: '8颗草莓加7颗' },
            { a: 15, b: 3, op: '+', hint: '15只蝴蝶加3只' },
            // 20以内减法
            { a: 18, b: 6, op: '-', hint: '18个气球飞走6个' },
            { a: 14, b: 8, op: '-', hint: '14颗糖果吃掉8颗' },
            { a: 20, b: 9, op: '-', hint: '20块积木拿走9块' }
        ];
        
        // 语文题库（拼音）
        const chineseQuestions = [
            { pinyin: 'mā ma', answer: '妈妈', hint: '和妈妈打招呼' },
            { pinyin: 'bà ba', answer: '爸爸', hint: '和爸爸打招呼' },
            { pinyin: 'xiǎo gǒu', answer: '小狗', hint: '人类的好朋友' },
            { pinyin: 'xiǎo māo', answer: '小猫', hint: '会抓老鼠的动物' },
            { pinyin: 'niǎo ér', answer: '鸟儿', hint: '在天上飞的' },
            { pinyin: 'huā ér', answer: '花儿', hint: '春天开的很漂亮' },
            { pinyin: 'yuè liang', answer: '月亮', hint: '晚上挂在天上' },
            { pinyin: 'tài yáng', answer: '太阳', hint: '白天出来，很暖和' },
            { pinyin: 'shuǐ guǒ', answer: '水果', hint: '苹果、梨子、香蕉' },
            { pinyin: 'xiǎo xué', answer: '小学', hint: '你现在上学的地方' },
            { pinyin: 'chī fàn', answer: '吃饭', hint: '每天要做的事情' },
            { pinyin: 'hē shuǐ', answer: '喝水', hint: '口渴了要干什么' },
            { pinyin: 'tiào wǔ', answer: '跳舞', hint: '随着音乐动起来' },
            { pinyin: 'chàng gē', answer: '唱歌', hint: '发出动听的声音' },
            { pinyin: 'dú shū', answer: '读书', hint: '学习知识' }
        ];
        
        let currentQuestion = null;
        let options = [];
        
        // 初始化
        function init() {
            loadState();
            updateUI();
        }
        
        // 保存状态
        function saveState() {
            localStorage.setItem('pandaGameState', JSON.stringify(state));
        }
        
        // 加载状态
        function loadState() {
            const saved = localStorage.getItem('pandaGameState');
            if (saved) {
                state = { ...state, ...JSON.parse(saved) };
            }
        }
        
        // 更新UI
        function updateUI() {
            document.getElementById('stars').textContent = state.stars;
            document.getElementById('coins').textContent = state.coins;
            document.getElementById('hearts').textContent = state.hearts;
        }
        
        // 显示科目选择
        function showSubjectSelect() {
            document.getElementById('subjectCards').style.display = 'grid';
            document.querySelector('.start-btn').textContent = '选择科目开始学习';
            document.querySelector('.start-btn').onclick = null;
        }
        
        // 开始答题
        function startQuiz(subject) {
            state.currentSubject = subject;
            state.currentQuestion = 0;
            state.correctAnswers = 0;
            state.wrongAnswers = 0;
            state.streak = 0;
            
            document.getElementById('startScreen').classList.remove('active');
            document.getElementById('quizScreen').classList.add('active');
            document.getElementById('quizType').textContent = subject === 'math' ? '数学' : '语文';
            
            showQuestion();
        }
        
        // 显示问题
        function showQuestion() {
            let q;
            
            if (state.currentSubject === 'math') {
                q = mathQuestions[Math.floor(Math.random() * mathQuestions.length)];
                currentQuestion = {
                    answer: q.a + q.b,
                    display: `${q.a} ${q.op} ${q.b} = ?`,
                    hint: q.hint
                };
            } else {
                q = chineseQuestions[Math.floor(Math.random() * chineseQuestions.length)];
                currentQuestion = {
                    answer: q.answer,
                    display: q.pinyin,
                    hint: q.hint
                };
            }
            
            // 生成选项
            generateOptions();
            
            document.getElementById('questionText').textContent = currentQuestion.display;
            document.getElementById('questionHint').textContent = currentQuestion.hint;
            document.getElementById('progressText').textContent = 
                `第 ${state.currentQuestion + 1}/${state.totalQuestions} 题`;
            document.getElementById('progressFill').style.width = 
                `${(state.currentQuestion / state.totalQuestions) * 100}%`;
        }
        
        // 生成选项
        function generateOptions() {
            const container = document.getElementById('options');
            options = [currentQuestion.answer];
            
            // 生成干扰项
            if (state.currentSubject === 'math') {
                while (options.length < 4) {
                    const offset = Math.floor(Math.random() * 5) + 1;
                    const wrong = Math.random() > 0.5 
                        ? currentQuestion.answer + offset 
                        : Math.max(0, currentQuestion.answer - offset);
                    if (wrong !== currentQuestion.answer && !options.includes(wrong) && wrong > 0) {
                        options.push(wrong);
                    }
                }
            } else {
                // 语文：随机选择其他答案作为干扰项
                const allAnswers = chineseQuestions.map(q => q.answer);
                while (options.length < 4) {
                    const wrong = allAnswers[Math.floor(Math.random() * allAnswers.length)];
                    if (wrong !== currentQuestion.answer && !options.includes(wrong)) {
                        options.push(wrong);
                    }
                }
            }
            
            // 打乱顺序
            options.sort(() => Math.random() - 0.5);
            
            // 渲染按钮
            container.innerHTML = options.map(opt => 
                `<button class="option-btn" onclick="selectAnswer('${opt}')">${opt}</button>`
            ).join('');
        }
        
        // 选择答案
        function selectAnswer(answer) {
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(btn => {
                btn.disabled = true;
                if (btn.textContent == answer) {
                    if (answer == currentQuestion.answer) {
                        btn.classList.add('correct');
                    } else {
                        btn.classList.add('wrong');
                    }
                }
                if (btn.textContent == currentQuestion.answer) {
                    btn.classList.add('correct');
                }
            });
            
            setTimeout(() => {
                if (answer == currentQuestion.answer) {
                    handleCorrect();
                } else {
                    handleWrong();
                }
            }, 800);
        }
        
        // 答对了
        function handleCorrect() {
            state.correctAnswers++;
            state.streak++;
            state.currentQuestion++;
            
            // 奖励
            let reward = 10;
            let rewardIcon = '⭐';
            
            if (state.streak >= 5) {
                reward = 20;
                rewardIcon = '🔥';
                addAchievement('streak5', '连续答对5题', '🔥');
            }
            if (state.streak >= 10) {
                reward = 30;
                rewardIcon = '🌟';
                addAchievement('streak10', '连续答对10题', '🌟');
            }
            
            state.stars += reward;
            state.coins += 5;
            
            showReward(rewardIcon, '太棒了！', `+${reward} ⭐ +5 🪙`);
            saveState();
            updateUI();
            
            setTimeout(() => {
                if (state.currentQuestion >= state.totalQuestions) {
                    showResult();
                } else {
                    showQuestion();
                }
            }, 1500);
        }
        
        // 答错了
        function handleWrong() {
            state.wrongAnswers++;
            state.streak = 0;
            state.currentQuestion++;
            state.hearts--;
            
            showReward('😢', '没关系~', '继续加油！');
            saveState();
            updateUI();
            
            setTimeout(() => {
                if (state.hearts <= 0) {
                    showResult();
                } else if (state.currentQuestion >= state.totalQuestions) {
                    showResult();
                } else {
                    showQuestion();
                }
            }, 1500);
        }
        
        // 显示奖励
        function showReward(icon, text, detail) {
            document.getElementById('rewardIcon').textContent = icon;
            document.getElementById('rewardText').textContent = text;
            document.getElementById('rewardDetail').textContent = detail;
            document.getElementById('overlay').classList.add('show');
            document.getElementById('rewardPopup').classList.add('show');
            
            setTimeout(() => {
                document.getElementById('overlay').classList.remove('show');
                document.getElementById('rewardPopup').classList.remove('show');
            }, 1200);
        }
        
        // 添加成就
        function addAchievement(id, name, icon) {
            if (!state.achievements.includes(id)) {
                state.achievements.push(id);
            }
        }
        
        // 显示结果
        function showResult() {
            document.getElementById('quizScreen').classList.remove('active');
            document.getElementById('resultScreen').classList.add('active');
            
            const accuracy = Math.round((state.correctAnswers / state.totalQuestions) * 100);
            
            if (accuracy >= 80) {
                document.getElementById('resultPanda').textContent = '🎉';
                document.getElementById('resultTitle').textContent = '太棒了！';
            } else if (accuracy >= 60) {
                document.getElementById('resultPanda').textContent = '😊';
                document.getElementById('resultTitle').textContent = '还不错！';
            } else {
                document.getElementById('resultPanda').textContent = '💪';
                document.getElementById('resultTitle').textContent = '继续加油！';
            }
            
            document.getElementById('correctCount').textContent = state.correctAnswers;
            document.getElementById('wrongCount').textContent = state.wrongAnswers;
            document.getElementById('accuracy').textContent = accuracy + '%';
            
            // 显示成就
            const achievementList = document.getElementById('achievements');
            if (state.achievements.length > 0) {
                achievementList.innerHTML = state.achievements.map(id => {
                    const names = {
                        'streak5': { icon: '🔥', name: '连续5题' },
                        'streak10': { icon: '🌟', name: '连续10题' }
                    };
                    return `<span class="achievement">${names[id]?.icon || '🏆'} ${names[id]?.name || id}</span>`;
                }).join('');
            }
            
            saveState();
        }
        
        // 继续答题
        function continueQuiz() {
            state.hearts = 3;
            document.getElementById('resultScreen').classList.remove('active');
            document.getElementById('quizScreen').classList.add('active');
            state.currentQuestion = 0;
            state.correctAnswers = 0;
            state.wrongAnswers = 0;
            state.streak = 0;
            saveState();
            updateUI();
            showQuestion();
        }
        
        // 返回主页
        function goHome() {
            document.getElementById('quizScreen').classList.remove('active');
            document.getElementById('resultScreen').classList.remove('active');
            document.getElementById('startScreen').classList.add('active');
            document.getElementById('subjectCards').style.display = 'none';
            document.querySelector('.start-btn').textContent = '开始学习';
            document.querySelector('.start-btn').onclick = showSubjectSelect;
            updateUI();
        }
        
        // 初始化游戏
        init();
    </script>
</body>
</html>
