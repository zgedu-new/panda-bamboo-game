<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>2048 游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 100%;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .scores {
            display: flex;
            gap: 8px;
        }

        .score-box {
            background: #333;
            color: #fff;
            padding: 8px 12px;
            border-radius: 8px;
            text-align: center;
            min-width: 60px;
        }

        .score-box .label {
            font-size: 0.6rem;
            color: #aaa;
            text-transform: uppercase;
        }

        .score-box .value {
            font-size: 1rem;
            font-weight: bold;
        }

        .grid-container {
            position: relative;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            background: #bbada0;
            padding: 8px;
            border-radius: 8px;
        }

        .cell {
            aspect-ratio: 1;
            background: rgba(238, 228, 218, 0.35);
            border-radius: 6px;
        }

        .tiles-container {
            position: absolute;
            top: 8px;
            left: 8px;
            width: calc(100% - 16px);
            height: calc(100% - 16px);
        }

        .tile {
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 1.8rem;
            border-radius: 6px;
            transition: transform 0.12s ease-out, top 0.12s ease-out, left 0.12s ease-out;
            will-change: transform, top, left;
        }

        .tile-2 { background: #eee4da; color: #776e65; }
        .tile-4 { background: #ede0c8; color: #776e65; }
        .tile-8 { background: #f2b179; color: #f9f6f2; }
        .tile-16 { background: #f59563; color: #f9f6f2; }
        .tile-32 { background: #f67c5f; color: #f9f6f2; }
        .tile-64 { background: #f65e3b; color: #f9f6f2; }
        .tile-128 { background: #edcf72; color: #f9f6f2; font-size: 1.5rem; }
        .tile-256 { background: #edcc61; color: #f9f6f2; font-size: 1.5rem; }
        .tile-512 { background: #edc850; color: #f9f6f2; font-size: 1.5rem; }
        .tile-1024 { background: #edc53f; color: #f9f6f2; font-size: 1.2rem; }
        .tile-2048 { background: #edc22e; color: #f9f6f2; font-size: 1.2rem; }
        .tile-super { background: #3c3a32; color: #f9f6f2; font-size: 1rem; }

        .tile-new {
            animation: pop 0.15s ease;
        }

        .tile-merged {
            animation: merge-pop 0.15s ease;
        }

        @keyframes pop {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes merge-pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border: none;
            padding: 10px 20px;
            font-size: 0.9rem;
            border-radius: 20px;
            cursor: pointer;
            transition: transform 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn.active {
            background: linear-gradient(135deg, #11998e, #38ef7d);
        }

        .btn.muted {
            background: linear-gradient(135deg, #666, #888);
        }

        .instructions {
            margin-top: 15px;
            padding: 12px;
            background: #faf8ef;
            border-radius: 8px;
            font-size: 0.8rem;
            color: #776e65;
            text-align: center;
        }

        .game-over {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 100;
        }

        .game-over.show {
            opacity: 1;
            pointer-events: auto;
        }

        .game-over.win h2 {
            color: #edc22e;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>2048</h1>
            <div class="scores">
                <div class="score-box">
                    <div class="label">分数</div>
                    <div class="value" id="score">0</div>
                </div>
                <div class="score-box">
                    <div class="label">最高</div>
                    <div class="value" id="best">0</div>
                </div>
            </div>
        </div>

        <div class="grid-container">
            <div class="grid" id="grid"></div>
            <div class="tiles-container" id="tiles-container"></div>
        </div>

        <div class="controls">
            <button class="btn" id="sound-btn" onclick="toggleSound()">
                <span id="sound-icon">🔊</span>
                <span id="sound-text">音乐</span>
            </button>
            <button class="btn" onclick="game.restart()">新游戏</button>
        </div>

        <div class="instructions">
            <strong>玩法：</strong>使用方向键或滑动屏幕移动方块<br>
            相同数字碰撞会合并，目标是得到 <strong>2048</strong>！
        </div>
    </div>

    <div class="game-over" id="game-over">
        <h2 id="game-over-text">游戏结束</h2>
        <button class="btn" onclick="game.restart()">再来一局</button>
    </div>

    <script>
        // 声音设置
        let soundEnabled = false;
        let bgMusicPlaying = false;
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;
        let bgMusicInterval = null;
        let bgMusicOscillators = [];

        // 切换声音
        function toggleSound() {
            if (!audioCtx) {
                audioCtx = new AudioContext();
            }
            
            soundEnabled = !soundEnabled;
            const btn = document.getElementById('sound-btn');
            const icon = document.getElementById('sound-icon');
            const text = document.getElementById('sound-text');
            
            if (soundEnabled) {
                btn.classList.add('active');
                btn.classList.remove('muted');
                icon.textContent = '🔊';
                text.textContent = '音乐';
                startBgMusic();
            } else {
                btn.classList.remove('active');
                btn.classList.add('muted');
                icon.textContent = '🔇';
                text.textContent = '静音';
                stopBgMusic();
            }
        }

        // 背景音乐 - 简单的旋律循环
        const melody = [
            392.00, 440.00, 493.88, 523.25,  // G A B C
            587.33, 523.25, 493.88, 440.00,  // D C B A
            392.00, 349.23, 329.63, 293.66,  // G F E D
            261.63, 293.66, 329.63, 392.00,  // C D E G
        ];
        let melodyIndex = 0;
        let bassOscillator = null;
        let melodyOscillator = null;

        function playBgNote() {
            if (!soundEnabled || !audioCtx) return;
            
            // 停止之前的音符
            bgMusicOscillators.forEach(osc => {
                try { osc.stop(); } catch(e) {}
            });
            bgMusicOscillators = [];
            
            // 旋律音符
            const melodyFreq = melody[melodyIndex];
            const osc1 = audioCtx.createOscillator();
            const gain1 = audioCtx.createGain();
            osc1.type = 'triangle';
            osc1.frequency.setValueAtTime(melodyFreq, audioCtx.currentTime);
            gain1.gain.setValueAtTime(0.08, audioCtx.currentTime);
            gain1.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            osc1.connect(gain1);
            gain1.connect(audioCtx.destination);
            osc1.start();
            osc1.stop(audioCtx.currentTime + 0.4);
            bgMusicOscillators.push(osc1);
            
            // 低音伴奏 (每4拍)
            if (melodyIndex % 4 === 0) {
                const bassFreq = melody[melodyIndex] / 2;
                const osc2 = audioCtx.createOscillator();
                const gain2 = audioCtx.createGain();
                osc2.type = 'sine';
                osc2.frequency.setValueAtTime(bassFreq, audioCtx.currentTime);
                gain2.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gain2.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.8);
                osc2.connect(gain2);
                gain2.connect(audioCtx.destination);
                osc2.start();
                osc2.stop(audioCtx.currentTime + 0.8);
                bgMusicOscillators.push(osc2);
            }
            
            melodyIndex = (melodyIndex + 1) % melody.length;
        }

        function startBgMusic() {
            if (bgMusicPlaying) return;
            bgMusicPlaying = true;
            melodyIndex = 0;
            // 每 300ms 播放一个音符
            bgMusicInterval = setInterval(playBgNote, 300);
            playBgNote(); // 立即播放第一个
        }

        function stopBgMusic() {
            bgMusicPlaying = false;
            if (bgMusicInterval) {
                clearInterval(bgMusicInterval);
                bgMusicInterval = null;
            }
            bgMusicOscillators.forEach(osc => {
                try { osc.stop(); } catch(e) {}
            });
            bgMusicOscillators = [];
        }

        // 音效
        function playMergeSound(value) {
            if (!soundEnabled || !audioCtx) return;
            
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            // 根据合并的值调整音调
            const freq = 300 + Math.log2(value) * 80;
            oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);
            oscillator.type = 'sine';
            
            gainNode.gain.setValueAtTime(0.25, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            
            oscillator.start(audioCtx.currentTime);
            oscillator.stop(audioCtx.currentTime + 0.15);
        }

        function playMoveSound() {
            if (!soundEnabled || !audioCtx) return;
            
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.frequency.setValueAtTime(150, audioCtx.currentTime);
            oscillator.type = 'sine';
            
            gainNode.gain.setValueAtTime(0.08, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
            
            oscillator.start(audioCtx.currentTime);
            oscillator.stop(audioCtx.currentTime + 0.05);
        }

        function playWinSound() {
            if (!soundEnabled || !audioCtx) return;
            
            const notes = [523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6
            
            notes.forEach((freq, i) => {
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime + i * 0.1);
                oscillator.type = 'sine';
                
                gainNode.gain.setValueAtTime(0, audioCtx.currentTime + i * 0.1);
                gainNode.gain.linearRampToValueAtTime(0.25, audioCtx.currentTime + i * 0.1 + 0.05);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.1 + 0.3);
                
                oscillator.start(audioCtx.currentTime + i * 0.1);
                oscillator.stop(audioCtx.currentTime + i * 0.1 + 0.3);
            });
        }

        function playGameOverSound() {
            if (!soundEnabled || !audioCtx) return;
            
            const notes = [392, 349.23, 293.66, 261.63]; // G F E D 下降
            
            notes.forEach((freq, i) => {
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime + i * 0.15);
                oscillator.type = 'sine';
                
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime + i * 0.15);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.15 + 0.3);
                
                oscillator.start(audioCtx.currentTime + i * 0.15);
                oscillator.stop(audioCtx.currentTime + i * 0.15 + 0.3);
            });
        }

        class Game2048 {
            constructor() {
                this.size = 4;
                this.grid = [];
                this.score = 0;
                this.best = parseInt(localStorage.getItem('2048-best')) || 0;
                this.gameOver = false;
                this.won = false;
                this.tileId = 0;
                this.tiles = new Map();

                this.init();
            }

            init() {
                this.renderGrid();
                this.updateBestDisplay();
                this.restart();
                this.setupControls();
            }

            renderGrid() {
                const gridEl = document.getElementById('grid');
                gridEl.innerHTML = '';
                for (let i = 0; i < this.size * this.size; i++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    gridEl.appendChild(cell);
                }
            }

            restart() {
                this.grid = Array(this.size).fill(null).map(() => Array(this.size).fill(0));
                this.score = 0;
                this.gameOver = false;
                this.won = false;

                // 清理所有 tile
                const container = document.getElementById('tiles-container');
                container.innerHTML = '';
                this.tiles.clear();

                document.getElementById('game-over').classList.remove('show', 'win');
                document.getElementById('score').textContent = '0';

                this.addRandomTile();
                this.addRandomTile();
            }

            getCellSize() {
                const gridEl = document.getElementById('grid');
                const width = gridEl.offsetWidth;
                const gap = 8;
                return (width - 16 - gap * 3) / 4;
            }

            getCellPosition(row, col) {
                const cellSize = this.getCellSize();
                const gap = 8;
                return {
                    left: col * (cellSize + gap),
                    top: row * (cellSize + gap),
                    size: cellSize
                };
            }

            createTileElement(row, col, value, isNew = false) {
                const tile = document.createElement('div');
                const pos = this.getCellPosition(row, col);
                const fontSize = pos.size * 0.45;

                tile.className = `tile tile-${value > 2048 ? 'super' : value}`;
                if (isNew) tile.classList.add('tile-new');
                
                tile.style.width = pos.size + 'px';
                tile.style.height = pos.size + 'px';
                tile.style.left = pos.left + 'px';
                tile.style.top = pos.top + 'px';
                tile.style.fontSize = fontSize + 'px';
                tile.textContent = value;

                return tile;
            }

            addRandomTile() {
                const empty = [];
                for (let r = 0; r < this.size; r++) {
                    for (let c = 0; c < this.size; c++) {
                        if (this.grid[r][c] === 0) {
                            empty.push({ r, c });
                        }
                    }
                }
                if (empty.length === 0) return null;

                const { r, c } = empty[Math.floor(Math.random() * empty.length)];
                const value = Math.random() < 0.9 ? 2 : 4;
                this.grid[r][c] = value;

                const id = ++this.tileId;
                const container = document.getElementById('tiles-container');
                const tile = this.createTileElement(r, c, value, true);
                tile.dataset.id = id;
                container.appendChild(tile);

                this.tiles.set(`${r},${c}`, { id, value, element: tile });
                return { r, c, value };
            }

            setupControls() {
                // 键盘控制
                document.addEventListener('keydown', (e) => {
                    if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                        e.preventDefault();
                        if (!this.gameOver) {
                            this.move(e.key.replace('Arrow', '').toLowerCase());
                        }
                    }
                });

                // 触摸控制
                let touchStartX, touchStartY;
                document.addEventListener('touchstart', (e) => {
                    touchStartX = e.touches[0].clientX;
                    touchStartY = e.touches[0].clientY;
                }, { passive: true });

                document.addEventListener('touchend', (e) => {
                    if (this.gameOver) return;
                    const touchEndX = e.changedTouches[0].clientX;
                    const touchEndY = e.changedTouches[0].clientY;
                    const dx = touchEndX - touchStartX;
                    const dy = touchEndY - touchStartY;
                    const minSwipe = 30;

                    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > minSwipe) {
                        this.move(dx > 0 ? 'right' : 'left');
                    } else if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > minSwipe) {
                        this.move(dy > 0 ? 'down' : 'up');
                    }
                }, { passive: true });
            }

            move(direction) {
                let moved = false;
                const mergedPositions = [];

                const vectors = {
                    up: { r: -1, c: 0 },
                    down: { r: 1, c: 0 },
                    left: { r: 0, c: -1 },
                    right: { r: 0, c: 1 }
                };

                const v = vectors[direction];
                const traversals = this.buildTraversals(v);

                // 清除合并标记
                const merged = Array(this.size).fill(null).map(() => Array(this.size).fill(false));

                traversals.rows.forEach(r => {
                    traversals.cols.forEach(c => {
                        const value = this.grid[r][c];
                        if (value === 0) return;

                        let { newR, newC, merge } = this.findFarthestPosition(r, c, v, merged);

                        if (newR !== r || newC !== c) {
                            moved = true;
                            this.grid[r][c] = 0;

                            if (merge) {
                                const newValue = value * 2;
                                this.grid[newR][newC] = newValue;
                                merged[newR][newC] = true;
                                this.score += newValue;
                                this.updateScore();
                                mergedPositions.push({ r: newR, c: newC });
                                playMergeSound(newValue);

                                if (newValue === 2048 && !this.won) {
                                    this.won = true;
                                    setTimeout(() => {
                                        document.getElementById('game-over-text').textContent = '🎉 恭喜通关！';
                                        document.getElementById('game-over').classList.add('show', 'win');
                                        playWinSound();
                                    }, 200);
                                }
                            } else {
                                this.grid[newR][newC] = value;
                                playMoveSound();
                            }

                            // 移动 tile 元素
                            const tileData = this.tiles.get(`${r},${c}`);
                            if (tileData) {
                                this.tiles.delete(`${r},${c}`);
                                const pos = this.getCellPosition(newR, newC);
                                const tile = tileData.element;
                                tile.style.left = pos.left + 'px';
                                tile.style.top = pos.top + 'px';
                                this.tiles.set(`${newR},${newC}`, { id: tileData.id, value: merge ? newValue : value, element: tile });
                            }
                        }
                    });
                });

                if (moved) {
                    // 动画结束后添加合并效果
                    setTimeout(() => {
                        mergedPositions.forEach(pos => {
                            const key = `${pos.r},${pos.c}`;
                            const tileData = this.tiles.get(key);
                            if (tileData) {
                                tileData.element.classList.add('tile-merged');
                                setTimeout(() => tileData.element.classList.remove('tile-merged'), 150);
                            }
                        });
                    }, 120);

                    setTimeout(() => {
                        this.addRandomTile();
                        if (this.isGameOver()) {
                            this.gameOver = true;
                            setTimeout(() => {
                                document.getElementById('game-over-text').textContent = '游戏结束';
                                document.getElementById('game-over').classList.add('show');
                                playGameOverSound();
                            }, 200);
                        }
                    }, 130);
                }
            }

            buildTraversals(v) {
                const rows = [];
                const cols = [];
                for (let i = 0; i < this.size; i++) {
                    rows.push(i);
                    cols.push(i);
                }
                if (v.r === 1) rows.reverse();
                if (v.c === 1) cols.reverse();
                return { rows, cols };
            }

            findFarthestPosition(row, col, v, merged) {
                let newR = row;
                let newC = col;
                let prevR = row;
                let prevC = col;

                do {
                    prevR = newR;
                    prevC = newC;
                    newR += v.r;
                    newC += v.c;
                } while (this.withinBounds(newR, newC) && this.grid[newR][newC] === 0);

                if (this.withinBounds(newR, newC) && 
                    this.grid[newR][newC] === this.grid[row][col] && 
                    !merged[newR][newC]) {
                    return { newR, newC, merge: true };
                }

                return { newR: prevR, newC: prevC, merge: false };
            }

            withinBounds(r, c) {
                return r >= 0 && r < this.size && c >= 0 && c < this.size;
            }

            isGameOver() {
                // 检查是否有空格
                for (let r = 0; r < this.size; r++) {
                    for (let c = 0; c < this.size; c++) {
                        if (this.grid[r][c] === 0) return false;
                    }
                }

                // 检查是否还能合并
                for (let r = 0; r < this.size; r++) {
                    for (let c = 0; c < this.size; c++) {
                        const value = this.grid[r][c];
                        if (c < this.size - 1 && this.grid[r][c + 1] === value) return false;
                        if (r < this.size - 1 && this.grid[r + 1][c] === value) return false;
                    }
                }

                return true;
            }

            updateScore() {
                document.getElementById('score').textContent = this.score;
                if (this.score > this.best) {
                    this.best = this.score;
                    localStorage.setItem('2048-best', this.best);
                    this.updateBestDisplay();
                }
            }

            updateBestDisplay() {
                document.getElementById('best').textContent = this.best;
            }
        }

        // 初始化游戏
        const game = new Game2048();

        // 初始化按钮状态
        document.getElementById('sound-btn').classList.add('muted');
    </script>
</body>
</html>
