<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>2048 游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 100%;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .scores {
            display: flex;
            gap: 8px;
        }

        .score-box {
            background: #333;
            color: #fff;
            padding: 8px 12px;
            border-radius: 8px;
            text-align: center;
            min-width: 60px;
        }

        .score-box .label {
            font-size: 0.6rem;
            color: #aaa;
            text-transform: uppercase;
        }

        .score-box .value {
            font-size: 1rem;
            font-weight: bold;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            background: #bbada0;
            padding: 8px;
            border-radius: 8px;
        }

        .cell {
            aspect-ratio: 1;
            background: rgba(238, 228, 218, 0.35);
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 1.8rem;
        }

        .cell-2 { background: #eee4da; color: #776e65; }
        .cell-4 { background: #ede0c8; color: #776e65; }
        .cell-8 { background: #f2b179; color: #f9f6f2; }
        .cell-16 { background: #f59563; color: #f9f6f2; }
        .cell-32 { background: #f67c5f; color: #f9f6f2; }
        .cell-64 { background: #f65e3b; color: #f9f6f2; }
        .cell-128 { background: #edcf72; color: #f9f6f2; font-size: 1.5rem; }
        .cell-256 { background: #edcc61; color: #f9f6f2; font-size: 1.5rem; }
        .cell-512 { background: #edc850; color: #f9f6f2; font-size: 1.5rem; }
        .cell-1024 { background: #edc53f; color: #f9f6f2; font-size: 1.2rem; }
        .cell-2048 { background: #edc22e; color: #f9f6f2; font-size: 1.2rem; }
        .cell-super { background: #3c3a32; color: #f9f6f2; font-size: 1rem; }

        .controls {
            margin-top: 15px;
            text-align: center;
        }

        .btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border: none;
            padding: 10px 25px;
            font-size: 0.9rem;
            border-radius: 20px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .instructions {
            margin-top: 15px;
            padding: 12px;
            background: #faf8ef;
            border-radius: 8px;
            font-size: 0.8rem;
            color: #776e65;
            text-align: center;
        }

        .game-over {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 100;
        }

        .game-over.show {
            opacity: 1;
            pointer-events: auto;
        }

        .game-over h2 {
            color: #333;
            font-size: 2rem;
            margin-bottom: 20px;
        }

        .game-over.win h2 {
            color: #edc22e;
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        .cell-new {
            animation: pop 0.2s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>2048</h1>
            <div class="scores">
                <div class="score-box">
                    <div class="label">分数</div>
                    <div class="value" id="score">0</div>
                </div>
                <div class="score-box">
                    <div class="label">最高</div>
                    <div class="value" id="best">0</div>
                </div>
            </div>
        </div>

        <div class="grid" id="grid"></div>

        <div class="controls">
            <button class="btn" onclick="game.restart()">新游戏</button>
        </div>

        <div class="instructions">
            <strong>玩法：</strong>使用方向键或滑动屏幕移动方块<br>
            相同数字碰撞会合并，目标是得到 <strong>2048</strong>！
        </div>
    </div>

    <div class="game-over" id="game-over">
        <h2 id="game-over-text">游戏结束</h2>
        <button class="btn" onclick="game.restart()">再来一局</button>
    </div>

    <script>
        class Game2048 {
            constructor() {
                this.size = 4;
                this.grid = [];
                this.score = 0;
                this.best = parseInt(localStorage.getItem('2048-best')) || 0;
                this.gameOver = false;
                this.won = false;

                this.init();
            }

            init() {
                this.renderGrid();
                this.updateBestDisplay();
                this.restart();
                this.setupControls();
            }

            renderGrid() {
                const gridEl = document.getElementById('grid');
                gridEl.innerHTML = '';
                for (let i = 0; i < this.size * this.size; i++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.id = 'cell-' + i;
                    gridEl.appendChild(cell);
                }
            }

            restart() {
                this.grid = Array(this.size).fill(null).map(() => Array(this.size).fill(0));
                this.score = 0;
                this.gameOver = false;
                this.won = false;

                document.getElementById('game-over').classList.remove('show', 'win');
                document.getElementById('score').textContent = '0';

                this.addRandomTile();
                this.addRandomTile();
                this.render();
            }

            addRandomTile() {
                const empty = [];
                for (let r = 0; r < this.size; r++) {
                    for (let c = 0; c < this.size; c++) {
                        if (this.grid[r][c] === 0) {
                            empty.push({ r, c });
                        }
                    }
                }
                if (empty.length === 0) return null;

                const { r, c } = empty[Math.floor(Math.random() * empty.length)];
                this.grid[r][c] = Math.random() < 0.9 ? 2 : 4;
                return { r, c };
            }

            setupControls() {
                // 键盘控制
                document.addEventListener('keydown', (e) => {
                    if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                        e.preventDefault();
                        if (!this.gameOver) {
                            this.move(e.key.replace('Arrow', '').toLowerCase());
                        }
                    }
                });

                // 触摸控制
                let touchStartX, touchStartY;
                document.addEventListener('touchstart', (e) => {
                    touchStartX = e.touches[0].clientX;
                    touchStartY = e.touches[0].clientY;
                }, { passive: true });

                document.addEventListener('touchend', (e) => {
                    if (!touchStartX || !touchStartY) return;

                    const diffX = e.changedTouches[0].clientX - touchStartX;
                    const diffY = e.changedTouches[0].clientY - touchStartY;
                    const minSwipe = 30;

                    if (Math.abs(diffX) > Math.abs(diffY)) {
                        if (Math.abs(diffX) > minSwipe) {
                            this.move(diffX > 0 ? 'right' : 'left');
                        }
                    } else {
                        if (Math.abs(diffY) > minSwipe) {
                            this.move(diffY > 0 ? 'down' : 'up');
                        }
                    }

                    touchStartX = null;
                    touchStartY = null;
                }, { passive: true });
            }

            move(direction) {
                const vectors = {
                    up: { r: -1, c: 0 },
                    down: { r: 1, c: 0 },
                    left: { r: 0, c: -1 },
                    right: { r: 0, c: 1 }
                };

                const vector = vectors[direction];
                let moved = false;
                const mergedPositions = new Set();

                const traversals = this.buildTraversals(vector);

                traversals.r.forEach(r => {
                    traversals.c.forEach(c => {
                        if (this.grid[r][c] !== 0) {
                            const { farthest, next } = this.findFarthestPosition(r, c, vector);

                            if (next && this.grid[next.r][next.c] === this.grid[r][c] && !mergedPositions.has(`${next.r},${next.c}`)) {
                                const value = this.grid[r][c] * 2;
                                this.grid[r][c] = 0;
                                this.grid[next.r][next.c] = value;
                                this.score += value;
                                mergedPositions.add(`${next.r},${next.c}`);
                                moved = true;

                                if (value === 2048) {
                                    this.won = true;
                                }
                            } else if (farthest.r !== r || farthest.c !== c) {
                                this.grid[farthest.r][farthest.c] = this.grid[r][c];
                                this.grid[r][c] = 0;
                                moved = true;
                            }
                        }
                    });
                });

                if (moved) {
                    this.updateScore();
                    this.addRandomTile();
                    this.render();

                    if (this.won) {
                        document.getElementById('game-over-text').textContent = '🎉 你赢了！';
                        document.getElementById('game-over').classList.add('show', 'win');
                    } else if (!this.canMove()) {
                        document.getElementById('game-over-text').textContent = '游戏结束';
                        document.getElementById('game-over').classList.add('show');
                    }
                }
            }

            buildTraversals(vector) {
                const traversals = { r: [], c: [] };
                for (let i = 0; i < this.size; i++) {
                    traversals.r.push(i);
                    traversals.c.push(i);
                }
                if (vector.r === 1) traversals.r.reverse();
                if (vector.c === 1) traversals.c.reverse();
                return traversals;
            }

            findFarthestPosition(r, c, vector) {
                let previous;
                do {
                    previous = { r, c };
                    r += vector.r;
                    c += vector.c;
                } while (this.withinBounds(r, c) && this.grid[r][c] === 0);

                const next = this.withinBounds(r, c) ? { r, c } : null;
                return { farthest: previous, next };
            }

            withinBounds(r, c) {
                return r >= 0 && r < this.size && c >= 0 && c < this.size;
            }

            canMove() {
                for (let r = 0; r < this.size; r++) {
                    for (let c = 0; c < this.size; c++) {
                        if (this.grid[r][c] === 0) return true;
                    }
                }
                for (let r = 0; r < this.size; r++) {
                    for (let c = 0; c < this.size; c++) {
                        const value = this.grid[r][c];
                        if ((r < this.size - 1 && this.grid[r + 1][c] === value) ||
                            (c < this.size - 1 && this.grid[r][c + 1] === value)) {
                            return true;
                        }
                    }
                }
                return false;
            }

            render() {
                for (let r = 0; r < this.size; r++) {
                    for (let c = 0; c < this.size; c++) {
                        const index = r * this.size + c;
                        const cell = document.getElementById('cell-' + index);
                        const value = this.grid[r][c];

                        cell.textContent = value || '';
                        cell.className = 'cell' + (value ? ' cell-' + (value > 2048 ? 'super' : value) : '');
                    }
                }
            }

            updateScore() {
                document.getElementById('score').textContent = this.score;
                if (this.score > this.best) {
                    this.best = this.score;
                    localStorage.setItem('2048-best', this.best);
                    this.updateBestDisplay();
                }
            }

            updateBestDisplay() {
                document.getElementById('best').textContent = this.best;
            }
        }

        const game = new Game2048();
    </script>
</body>
</html>
