<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>1024 游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        h1 {
            color: #333;
            font-size: 2.5rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .scores {
            display: flex;
            gap: 10px;
        }

        .score-box {
            background: #333;
            color: #fff;
            padding: 10px 15px;
            border-radius: 10px;
            text-align: center;
            min-width: 80px;
        }

        .score-box .label {
            font-size: 0.7rem;
            color: #aaa;
            text-transform: uppercase;
        }

        .score-box .value {
            font-size: 1.2rem;
            font-weight: bold;
        }

        .game-container {
            position: relative;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            background: #bbada0;
            padding: 12px;
            border-radius: 10px;
        }

        .cell {
            aspect-ratio: 1;
            background: rgba(238, 228, 218, 0.35);
            border-radius: 8px;
        }

        .tile {
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            border-radius: 8px;
            transition: top 0.15s, left 0.15s;
            user-select: none;
        }

        .tile-2 { background: #eee4da; color: #776e65; }
        .tile-4 { background: #ede0c8; color: #776e65; }
        .tile-8 { background: #f2b179; color: #f9f6f2; }
        .tile-16 { background: #f59563; color: #f9f6f2; }
        .tile-32 { background: #f67c5f; color: #f9f6f2; }
        .tile-64 { background: #f65e3b; color: #f9f6f2; }
        .tile-128 { background: #edcf72; color: #f9f6f2; font-size: 1.8rem; }
        .tile-256 { background: #edcc61; color: #f9f6f2; font-size: 1.8rem; }
        .tile-512 { background: #edc850; color: #f9f6f2; font-size: 1.8rem; }
        .tile-1024 { background: #edc53f; color: #f9f6f2; font-size: 1.5rem; }
        .tile-2048 { background: #edc22e; color: #f9f6f2; font-size: 1.5rem; }
        .tile-super { background: #3c3a32; color: #f9f6f2; font-size: 1.2rem; }

        .controls {
            margin-top: 20px;
            text-align: center;
        }

        .btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin: 5px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .instructions {
            margin-top: 20px;
            padding: 15px;
            background: #faf8ef;
            border-radius: 10px;
            font-size: 0.9rem;
            color: #776e65;
            text-align: center;
        }

        .instructions strong {
            color: #333;
        }

        .game-over {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .game-over.show {
            opacity: 1;
            pointer-events: auto;
        }

        .game-over h2 {
            color: #333;
            font-size: 2rem;
            margin-bottom: 20px;
        }

        .game-over.win h2 {
            color: #edc22e;
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .tile-new {
            animation: pop 0.2s ease;
        }

        @keyframes merge {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .tile-merged {
            animation: merge 0.2s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>2048</h1>
            <div class="scores">
                <div class="score-box">
                    <div class="label">分数</div>
                    <div class="value" id="score">0</div>
                </div>
                <div class="score-box">
                    <div class="label">最高</div>
                    <div class="value" id="best">0</div>
                </div>
            </div>
        </div>

        <div class="game-container" id="game-container">
            <div class="grid" id="grid"></div>
            <div class="game-over" id="game-over">
                <h2 id="game-over-text">游戏结束</h2>
                <button class="btn" onclick="game.restart()">再来一局</button>
            </div>
        </div>

        <div class="controls">
            <button class="btn" onclick="game.restart()">新游戏</button>
        </div>

        <div class="instructions">
            <strong>玩法：</strong>使用方向键 ↑↓←→ 或滑动屏幕移动方块<br>
            相同数字碰撞会合并，目标是得到 <strong>2048</strong>！
        </div>
    </div>

    <script>
        class Game1024 {
            constructor() {
                this.size = 4;
                this.grid = [];
                this.score = 0;
                this.best = parseInt(localStorage.getItem('1024-best')) || 0;
                this.gameOver = false;
                this.won = false;
                this.tileId = 0;
                this.tiles = new Map();

                this.init();
            }

            init() {
                this.createGrid();
                this.updateBestDisplay();
                this.restart();
                this.setupControls();
            }

            createGrid() {
                const gridEl = document.getElementById('grid');
                gridEl.innerHTML = '';
                for (let i = 0; i < this.size * this.size; i++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    gridEl.appendChild(cell);
                }
            }

            restart() {
                this.grid = Array(this.size).fill(null).map(() => Array(this.size).fill(0));
                this.score = 0;
                this.gameOver = false;
                this.won = false;
                this.tiles.forEach(tile => tile.remove());
                this.tiles.clear();

                document.getElementById('game-over').classList.remove('show', 'win');
                document.getElementById('score').textContent = '0';

                this.addRandomTile();
                this.addRandomTile();
                this.render();
            }

            addRandomTile() {
                const empty = [];
                for (let r = 0; r < this.size; r++) {
                    for (let c = 0; c < this.size; c++) {
                        if (this.grid[r][c] === 0) {
                            empty.push({ r, c });
                        }
                    }
                }
                if (empty.length === 0) return null;

                const { r, c } = empty[Math.floor(Math.random() * empty.length)];
                const value = Math.random() < 0.9 ? 2 : 4;
                this.grid[r][c] = value;
                return { r, c, value, isNew: true };
            }

            setupControls() {
                // 键盘控制
                document.addEventListener('keydown', (e) => {
                    if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                        e.preventDefault();
                        if (!this.gameOver) {
                            this.move(e.key.replace('Arrow', '').toLowerCase());
                        }
                    }
                });

                // 触摸控制
                let touchStartX, touchStartY;
                const container = document.getElementById('game-container');

                container.addEventListener('touchstart', (e) => {
                    touchStartX = e.touches[0].clientX;
                    touchStartY = e.touches[0].clientY;
                }, { passive: true });

                container.addEventListener('touchend', (e) => {
                    if (!touchStartX || !touchStartY) return;

                    const touchEndX = e.changedTouches[0].clientX;
                    const touchEndY = e.changedTouches[0].clientY;
                    const diffX = touchEndX - touchStartX;
                    const diffY = touchEndY - touchStartY;
                    const minSwipe = 50;

                    if (Math.abs(diffX) > Math.abs(diffY)) {
                        if (Math.abs(diffX) > minSwipe) {
                            this.move(diffX > 0 ? 'right' : 'left');
                        }
                    } else {
                        if (Math.abs(diffY) > minSwipe) {
                            this.move(diffY > 0 ? 'down' : 'up');
                        }
                    }

                    touchStartX = null;
                    touchStartY = null;
                }, { passive: true });
            }

            move(direction) {
                const vectors = {
                    up: { r: -1, c: 0 },
                    down: { r: 1, c: 0 },
                    left: { r: 0, c: -1 },
                    right: { r: 0, c: 1 }
                };

                const vector = vectors[direction];
                let moved = false;
                const mergedPositions = new Set();

                // 按方向排序遍历顺序
                const traversals = this.buildTraversals(vector);

                traversals.r.forEach(r => {
                    traversals.c.forEach(c => {
                        if (this.grid[r][c] !== 0) {
                            const { farthest, next } = this.findFarthestPosition(r, c, vector);

                            if (next && this.grid[next.r][next.c] === this.grid[r][c] && !mergedPositions.has(`${next.r},${next.c}`)) {
                                // 合并
                                const value = this.grid[r][c] * 2;
                                this.grid[r][c] = 0;
                                this.grid[next.r][next.c] = value;
                                this.score += value;
                                mergedPositions.add(`${next.r},${next.c}`);
                                moved = true;

                                if (value === 2048) {
                                    this.won = true;
                                }
                            } else if (farthest.r !== r || farthest.c !== c) {
                                // 移动
                                this.grid[farthest.r][farthest.c] = this.grid[r][c];
                                this.grid[r][c] = 0;
                                moved = true;
                            }
                        }
                    });
                });

                if (moved) {
                    this.updateScore();
                    this.addRandomTile();
                    this.render();

                    if (this.won) {
                        document.getElementById('game-over-text').textContent = '🎉 你赢了！';
                        document.getElementById('game-over').classList.add('show', 'win');
                    } else if (!this.canMove()) {
                        document.getElementById('game-over-text').textContent = '游戏结束';
                        document.getElementById('game-over').classList.add('show');
                    }
                }
            }

            buildTraversals(vector) {
                const traversals = { r: [], c: [] };
                for (let i = 0; i < this.size; i++) {
                    traversals.r.push(i);
                    traversals.c.push(i);
                }
                if (vector.r === 1) traversals.r.reverse();
                if (vector.c === 1) traversals.c.reverse();
                return traversals;
            }

            findFarthestPosition(r, c, vector) {
                let previous;
                do {
                    previous = { r, c };
                    r += vector.r;
                    c += vector.c;
                } while (this.withinBounds(r, c) && this.grid[r][c] === 0);

                const next = this.withinBounds(r, c) ? { r, c } : null;
                return { farthest: previous, next };
            }

            withinBounds(r, c) {
                return r >= 0 && r < this.size && c >= 0 && c < this.size;
            }

            canMove() {
                // 检查是否有空格
                for (let r = 0; r < this.size; r++) {
                    for (let c = 0; c < this.size; c++) {
                        if (this.grid[r][c] === 0) return true;
                    }
                }
                // 检查是否可以合并
                for (let r = 0; r < this.size; r++) {
                    for (let c = 0; c < this.size; c++) {
                        const value = this.grid[r][c];
                        if ((r < this.size - 1 && this.grid[r + 1][c] === value) ||
                            (c < this.size - 1 && this.grid[r][c + 1] === value)) {
                            return true;
                        }
                    }
                }
                return false;
            }

            render() {
                const container = document.getElementById('game-container');
                const gridEl = document.getElementById('grid');
                const cellWidth = gridEl.offsetWidth / this.size;
                const gap = 12;
                const padding = 12;

                // 清理旧的tile
                const existingTiles = container.querySelectorAll('.tile');
                existingTiles.forEach(tile => {
                    const id = parseInt(tile.dataset.id);
                    if (!this.tilePositions || !this.tilePositions.has(id)) {
                        tile.remove();
                    }
                });

                this.tilePositions = new Map();

                for (let r = 0; r < this.size; r++) {
                    for (let c = 0; c < this.size; c++) {
                        const value = this.grid[r][c];
                        if (value !== 0) {
                            const x = padding + c * cellWidth + 6;
                            const y = padding + r * cellWidth + 6;
                            const size = cellWidth - 12;
                            const fontSize = size * 0.45;

                            let tileClass = `tile-${value > 2048 ? 'super' : value}`;
                            if (this.newTile && this.newTile.r === r && this.newTile.c === c) {
                                tileClass += ' tile-new';
                            }

                            let tile = container.querySelector(`.tile[data-r="${r}"][data-c="${c}"]`);
                            if (tile) {
                                tile.style.width = size + 'px';
                                tile.style.height = size + 'px';
                                tile.style.left = x + 'px';
                                tile.style.top = y + 'px';
                                tile.style.fontSize = fontSize + 'px';
                                tile.textContent = value;
                                tile.className = tileClass;
                            } else {
                                tile = document.createElement('div');
                                tile.className = tileClass;
                                tile.style.width = size + 'px';
                                tile.style.height = size + 'px';
                                tile.style.left = x + 'px';
                                tile.style.top = y + 'px';
                                tile.style.fontSize = fontSize + 'px';
                                tile.textContent = value;
                                tile.dataset.r = r;
                                tile.dataset.c = c;
                                container.appendChild(tile);
                            }
                        }
                    }
                }

                this.newTile = null;
            }

            updateScore() {
                document.getElementById('score').textContent = this.score;
                if (this.score > this.best) {
                    this.best = this.score;
                    localStorage.setItem('1024-best', this.best);
                    this.updateBestDisplay();
                }
            }

            updateBestDisplay() {
                document.getElementById('best').textContent = this.best;
            }
        }

        const game = new Game1024();
    </script>
</body>
</html>
