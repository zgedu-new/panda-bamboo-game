<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SBTI 人格测试 — 2026最火自嘲测试</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #0a0a0f;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    .bg-particles {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 0; overflow: hidden;
    }
    .particle {
      position: absolute; border-radius: 50%;
      animation: float linear infinite; opacity: 0.12;
    }
    @keyframes float {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 0.12; }
      90% { opacity: 0.12; }
      100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }

    .container {
      position: relative; z-index: 1;
      width: 100%; max-width: 560px;
      padding: 24px 20px; text-align: center;
    }

    /* ===== 首页 ===== */
    .logo-badge {
      display: inline-block;
      background: linear-gradient(135deg, #ff4757, #ff6b81);
      color: #fff; font-size: 11px; font-weight: 700;
      padding: 4px 14px; border-radius: 20px;
      margin-bottom: 16px;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

    .logo-title {
      font-size: 56px; font-weight: 900;
      background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      line-height: 1.2; letter-spacing: -2px;
    }
    .logo-subtitle {
      font-size: 14px; color: #555; margin-top: 8px; letter-spacing: 1px;
    }
    .logo-desc {
      font-size: 14px; color: #555; margin-top: 16px; line-height: 1.8;
    }
    .hot-tag {
      display: inline-block;
      background: linear-gradient(135deg, #ff4757, #ff6b81);
      color: #fff; font-size: 11px; font-weight: 700;
      padding: 3px 12px; border-radius: 12px;
      animation: pulse 2s ease-in-out infinite;
      white-space: nowrap;
    }

    .start-btn {
      display: inline-block;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff; font-size: 18px; font-weight: 700;
      padding: 14px 52px; border-radius: 40px; border: none;
      cursor: pointer; margin-top: 16px;
      transition: all 0.3s;
      box-shadow: 0 4px 24px rgba(102, 126, 234, 0.4);
      letter-spacing: 2px;
    }

    .start-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(102, 126, 234, 0.6);
    }

    .stats-bar {
      display: flex; gap: 16px; justify-content: center;
      margin-top: 20px; font-size: 12px; color: #444;
    }
    .stat-item { display: flex; align-items: center; gap: 4px; }
    .stat-dot { width: 6px; height: 6px; border-radius: 50%; }

    /* ===== 进度条 ===== */
    .progress-wrap { display: none; margin-bottom: 24px; }
    .progress-bar-bg {
      width: 100%; height: 5px; background: #1a1a2e;
      border-radius: 3px; overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #667eea, #764ba2, #f093fb);
      border-radius: 3px; transition: width 0.4s ease; width: 0%;
    }
    .progress-text { font-size: 12px; color: #444; margin-top: 6px; text-align: right; }

    /* ===== 题目 ===== */
    .quiz-area { display: none; text-align: left; }
    .question-number { font-size: 11px; color: #667eea; font-weight: 700; letter-spacing: 2px; margin-bottom: 10px; }
    .question-text { font-size: 20px; font-weight: 700; color: #fff; line-height: 1.6; margin-bottom: 24px; }
    .options { display: flex; flex-direction: column; gap: 10px; }
    .option {
      background: #13132a; border: 2px solid #1e1e3f;
      border-radius: 14px; padding: 14px 18px; cursor: pointer;
      transition: all 0.2s; display: flex; align-items: center; gap: 12px;
      color: #888; font-size: 14px; line-height: 1.5;
    }
    .option:hover { border-color: #667eea; background: #1a1a35; color: #fff; transform: translateX(4px); }
    .option.selected { border-color: #667eea; background: linear-gradient(135deg, rgba(102,126,234,0.15), rgba(118,75,162,0.15)); color: #fff; }
    .option-letter {
      width: 30px; height: 30px; border-radius: 50%;
      background: #1e1e3f; display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 13px; flex-shrink: 0; transition: all 0.2s;
    }
    .option.selected .option-letter { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }

    /* ===== 结果页 ===== */
    .result-area { display: none; text-align: center; }

    /* 头像 */
    .result-avatar {
      width: 120px; height: 120px; margin: 0 auto 16px;
      border-radius: 50%; overflow: hidden;
      background: #13132a; border: 3px solid #1e1e3f;
      display: flex; align-items: center; justify-content: center;
      animation: bounceIn 0.8s ease;
    }
    .result-avatar svg { width: 100%; height: 100%; }
    @keyframes bounceIn {
      0% { transform: scale(0) rotate(-10deg); opacity: 0; }
      50% { transform: scale(1.15) rotate(5deg); }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    .result-match {
      font-size: 13px; color: #667eea; font-weight: 700;
      margin-bottom: 8px; letter-spacing: 1px;
    }
    .result-match-bar {
      width: 100%; height: 6px; background: #1a1a2e;
      border-radius: 3px; overflow: hidden; margin-bottom: 6px;
    }
    .result-match-fill {
      height: 100%; border-radius: 3px;
      background: linear-gradient(90deg, #667eea, #764ba2, #f093fb);
      transition: width 1s ease;
    }
    .result-match-pct {
      font-size: 28px; font-weight: 900;
      background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .result-type { font-size: 13px; color: #555; letter-spacing: 3px; margin-bottom: 4px; }
    .result-name { font-size: 36px; font-weight: 900; color: #fff; margin-bottom: 8px; }
    .result-motto {
      font-size: 13px; color: #666; font-style: italic;
      margin-bottom: 20px; padding: 0 16px;
    }

    /* 人格解读 */
    .result-desc {
      background: #13132a; border: 1px solid #1e1e3f;
      border-radius: 16px; padding: 20px;
      font-size: 13px; color: #888; line-height: 2;
      text-align: left; margin-bottom: 20px;
    }
    .result-desc strong { color: #667eea; }

    /* 次级人格 */
    .sub-types {
      display: flex; gap: 8px; justify-content: center;
      margin-bottom: 20px; flex-wrap: wrap;
    }
    .sub-type {
      background: #1a1a2e; border: 1px solid #2a2a4a;
      border-radius: 20px; padding: 5px 14px;
      font-size: 12px; color: #555;
      display: flex; align-items: center; gap: 4px;
    }
    .sub-type .sub-icon { width: 20px; height: 20px; }
    .sub-type .sub-name { color: #888; }

    /* 十五维度 */
    .dimensions-title {
      font-size: 13px; color: #667eea; font-weight: 700;
      letter-spacing: 2px; margin-bottom: 14px; text-align: left;
    }
    .dimensions-grid {
      background: #13132a; border: 1px solid #1e1e3f;
      border-radius: 16px; padding: 16px;
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px 16px; margin-bottom: 20px; text-align: left;
    }
    .dim-item { }
    .dim-label {
      font-size: 11px; color: #555; margin-bottom: 4px;
      display: flex; justify-content: space-between;
    }
    .dim-val { color: #667eea; font-weight: 700; }
    .dim-bar-bg {
      width: 100%; height: 4px; background: #1a1a2e;
      border-radius: 2px; overflow: hidden;
    }
    .dim-bar-fill {
      height: 100%; border-radius: 2px;
      background: linear-gradient(90deg, #667eea, #764ba2);
      transition: width 1.2s ease;
    }

    /* 分享按钮 */
    .share-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 16px; }
    .share-btn {
      padding: 10px 22px; border-radius: 24px; border: none;
      cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.3s;
    }
    .share-btn.primary {
      background: linear-gradient(135deg, #667eea, #764ba2); color: #fff;
    }
    .share-btn.secondary { background: #1e1e3f; color: #666; border: 1px solid #2a2a4a; }
    .share-btn:hover { transform: translateY(-2px); opacity: 0.9; }
    .share-btn.save-img {
      background: linear-gradient(135deg, #f093fb, #f5576c);
      color: #fff;
    }

    /* 保存图片弹层 */
    .save-overlay {
      display: none; position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.85); z-index: 9999;
      flex-direction: column; align-items: center; justify-content: center;
      padding: 20px; overflow-y: auto;
    }
    .save-overlay.show { display: flex; }
    .save-card {
      width: 100%; max-width: 400px;
      background: #1a1a2e;
      border-radius: 20px; border: 2px solid #2a2a4a;
      overflow: hidden; text-align: center;
    }
    .save-card-header {
      padding: 16px; font-size: 12px; color: #667eea;
      letter-spacing: 2px; border-bottom: 1px solid #2a2a4a;
    }
    .save-card-body { padding: 20px 16px; }
    .save-avatar-lg {
      width: 90px; height: 90px; margin: 0 auto 12px;
      border-radius: 50%; overflow: hidden;
      background: #13132a; border: 3px solid #667eea;
    }
    .save-avatar-lg svg { width: 100%; height: 100%; }
    .save-type-tag {
      font-size: 11px; color: #555; letter-spacing: 3px;
    }
    .save-name-lg {
      font-size: 32px; font-weight: 900; color: #fff;
      margin: 6px 0;
    }
    .save-motto-sm {
      font-size: 12px; color: #666; font-style: italic;
      margin-bottom: 14px;
    }
    .save-match-row { margin-bottom: 14px; text-align: center; padding: 16px 0; background: #1f1f38; border-radius: 12px; margin-top: 12px;}
    .save-match-label { font-size: 11px; color: #888; margin-bottom: 6px; letter-spacing: 2px; }
    .save-pct-big {
      font-size: 52px; font-weight: 900;
      color: #a78bfa;
      line-height: 1.1;
    }
    .save-dims-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px; text-align: left; margin-top: 12px;
    }
    .save-dim-item { }
    .save-dim-lbl { font-size: 10px; color:#888; display: flex; justify-content: space-between; margin-bottom: 3px; }
    .save-dim-val { color: #a78bfa; font-weight: 700; font-size: 10px; }
    .save-dim-bar { width: 100%; height: 5px; background: #0f0f23; border-radius: 3px; overflow: hidden; }
    .save-dim-fill { height: 100%; border-radius: 3px; background: #a78bfa; }
    .save-card-footer {
      padding: 12px; font-size: 10px; color: #333;
      border-top: 1px solid #2a2a4a;
    }
    .save-tip {
      color: #888; font-size: 13px; margin-top: 16px;
      text-align: center; line-height: 1.8;
    }
    .close-save-btn {
      margin-top: 16px; padding: 10px 36px; border-radius: 24px;
      border: 1px solid #444; background: transparent;
      color: #888; cursor: pointer; font-size: 13px;
    }
    .close-save-btn:hover { border-color: #666; color: #aaa; }

    .retest-link {
      display: inline-block; margin-top: 8px;
      color: #333; font-size: 12px; cursor: pointer;
      text-decoration: underline; text-decoration-style: dotted;
    }
    .retest-link:hover { color: #555; }

    .footer {
      text-align: center; font-size: 11px; color: #2a2a3a;
      margin-top: 24px; padding: 0 20px;
    }

    .fade-in { animation: fadeIn 0.5s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    @keyframes dimBar {
      from { width: 0%; }
      to { width: var(--target-width); }
    }
  </style>
</head>

<div class="bg-particles" id="particles"></div>

<div class="container">
  <!-- 首页 -->

  <!-- 保存图片弹层 -->
  <div class="save-overlay" id="saveOverlay">

      <div class="save-card-body" id="saveCardBody"></div>

    <button class="close-save-btn" onclick="closeSaveOverlay()">关闭</button>

</div>

      { text: "我没什么缺点（说完就后悔）", scores: { Faker: 3, Broken: 1, Alien: 1 } }
    ]
  },
  {
    text: "最后一道灵魂拷问：你现在对自己的状态满意吗？",
    options: [
      { text: "满意？我早就不想这些了", scores: { Dead: 3, Zombie: 1, Chaos: 1 } },
      { text: "不满意，但也不知道怎么改", scores: { Broken: 3, Edge: 1, Survivor: 1 } },
      { text: "还行，比下有余", scores: { Survivor: 3, Malo: 1, Joker: 1 } },
      { text: "不满意，我还要更努力", scores: { Boss: 3, God: 2, Faker: 1 } }
    ]
  }
];

// ========================================================
// 十五维度定义
// ========================================================
const DIM_LABELS = [
  "摆烂度", "反骨度", "社恐度", "内耗度", "打工人指数",
  "穷鬼度", "搞笑度", "内卷度", "情绪化", "治愈力",
  "躺平指数", "阴阳怪气", "社牛度", "自恋度", "打工魂"
];

// ========================================================
// 核心逻辑
// ========================================================
let currentQ = 0;
let scores = {};
let dimScores = {};

function initScores() {
  scores = {};
  dimScores = {};
  TYPES.forEach(t => scores[t.id] = 0);
  DIM_LABELS.forEach(d => dimScores[d] = 0);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz() {
  document.getElementById('home').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  document.getElementById('progressWrap').style.display = 'block';
  initScores();
  currentQ = 0;
  showQuestion();
}

function showQuestion() {
  const q = QUESTIONS[currentQ];
  const pct = Math.round((currentQ / QUESTIONS.length) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = (currentQ + 1) + ' / ' + QUESTIONS.length;
  document.getElementById('qNum').textContent = '第 ' + (currentQ + 1) + ' 题';
  document.getElementById('qText').textContent = q.text;

  const optsEl = document.getElementById('options');
  const letters = ['A', 'B', 'C', 'D'];
  const shuffledOptions = shuffle(q.options.map((o, i) => ({ ...o, letter: letters[i] })));

  optsEl.innerHTML = '';
  shuffledOptions.forEach(opt => {
    const div = document.createElement('div');
    div.className = 'option';
    div.innerHTML = '<div class="option-letter">' + opt.letter + '</div><div>' + opt.text + '</div>';
    div.onclick = () => selectOption(div, opt.scores);
    optsEl.appendChild(div);
  });
}

function selectOption(el, addScores) {
  document.querySelectorAll('.option').forEach(o => {
    o.style.pointerEvents = 'none';
    o.classList.remove('selected');
  });
  el.classList.add('selected');

  // 累加人格分数
  Object.entries(addScores).forEach(([type, val]) => {
    scores[type] = (scores[type] || 0) + val;
  });

  setTimeout(() => {
    currentQ++;
    if (currentQ < QUESTIONS.length) {
      showQuestion();
    } else {
      showResult();
    }
  }, 350);
}

function showResult() {
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('progressWrap').style.display = 'none';
  document.getElementById('result').style.display = 'block';

  // 找主类型 + 次级类型
  const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  const topId = sorted[0][0];
  const secondId = sorted[1][0];
  const thirdId = sorted[2][0];

  const topType = TYPES.find(t => t.id === topId);
  const secondType = TYPES.find(t => t.id === secondId);
  const thirdType = TYPES.find(t => t.id === thirdId);
  const topScore = sorted[0][1];
  const secondScore = sorted[1][1];

  // 匹配度计算：主类型占主导
  const totalScore = sorted.reduce((sum, [, v]) => sum + v, 0);
  const leadScore = topScore - secondScore;
  const matchPct = Math.round(60 + (leadScore / topScore) * 35);

  // 头像
  document.getElementById('rAvatar').innerHTML = AVATARS[topId] || AVATARS[topId];
  document.getElementById('rType').textContent = topId;
  document.getElementById('rName').textContent = topType.name + ' ' + topType.icon;
  document.getElementById('rMotto').textContent = '「' + topType.motto + '」';
  document.getElementById('rDesc').innerHTML = topType.desc;

  // 次级人格
  document.getElementById('subTypes').innerHTML = `
    <div class="sub-type">
      <div class="sub-icon">${AVATARS[secondId] ? AVATARS[secondId].replace('viewBox','style="width:20px;height:20px" viewBox') : ''}</div>
      <span class="sub-name">次级：${secondType.name}</span>
    </div>
    <div class="sub-type">
      <div class="sub-icon">${AVATARS[thirdId] ? AVATARS[thirdId].replace('viewBox','style="width:20px;height:20px" viewBox') : ''}</div>
      <span class="sub-name">潜在：${thirdType.name}</span>
    </div>
  `;

  // 匹配度动画
  setTimeout(() => {
    document.getElementById('rMatchBar').style.width = matchPct + '%';
    animateNumber(document.getElementById('rMatchPct'), 0, matchPct, 1200);
  }, 300);

  // 十五维度
  const dimsGrid = document.getElementById('dimensionsGrid');
  dimsGrid.innerHTML = '';
  DIM_LABELS.forEach(dim => {
    const val = topType.dims[dim] || Math.round(Math.random() * 40 + 20);
    const item = document.createElement('div');
    item.className = 'dim-item';
    item.innerHTML = `
      <div class="dim-label">
        <span>${dim}</span>
        <span class="dim-val" id="dimval_${dim}">0</span>
      </div>
      <div class="dim-bar-bg">
        <div class="dim-bar-fill" id="dimbar_${dim}" style="width:0%"></div>
      </div>
    `;
    dimsGrid.appendChild(item);
  });

  // 维度动画延迟触发
  setTimeout(() => {
    DIM_LABELS.forEach((dim, i) => {
      const val = topType.dims[dim] || 50;
      setTimeout(() => {
        document.getElementById('dimbar_' + dim).style.width = val + '%';
        animateNumber(document.getElementById('dimval_' + dim), 0, val, 600);
      }, i * 60);
    });
  }, 400);

  // 分享文本
  window.shareText = '我的SBTI人格是【' + topType.name + ' ' + topType.icon + '】，匹配度' + matchPct + '%。' + topType.motto + ' — 测测你是哪种？';

  // 保存结果数据供图片导出使用
  const dimsArray = DIM_LABELS.map(dim => ({
    name: dim,
    val: topType.dims[dim] || Math.round(Math.random() * 40 + 20)
  }));
  currentResultData = {
    avatar: AVATARS[topId],
    typeLabel: topId,
    name: topType.name + ' ' + topType.icon,
    motto: topType.motto,
    matchPct: matchPct,
    dims: dimsArray,
    subTypes: [
      { name: secondType.name },
      { name: thirdType.name }
    ]
  };
}

function animateNumber(el, from, to, duration) {
  const start = performance.now();
  const step = (now) => {
    const progress = Math.min((now - start) / duration, 1);
    el.textContent = Math.round(from + (to - from) * progress);
    if (progress < 1) requestAnimationFrame(step);
    else el.textContent = to;
  };
  requestAnimationFrame(step);
}

function copyResult() {
  const text = window.shareText || '我的SBTI人格测试结果出炉！';
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.querySelector('.share-btn.primary');
      btn.textContent = '✅ 已复制！';
      setTimeout(() => { btn.textContent = '📋 复制结果'; }, 2000);
    });
  }
}

function retest() {
  document.getElementById('result').style.display = 'none';
  document.getElementById('home').style.display = 'block';
  document.getElementById('rMatchBar').style.width = '0%';
}

// ===== 保存图片功能（原生Canvas，严格按结果页样式绘制）=====
let currentResultData = null;

function isWeChat() {
  return navigator.userAgent.toLowerCase().indexOf('micromessenger') !== -1;
}

async function saveAsImage() {
  if (!currentResultData) return;
  const btn = document.querySelector('.share-btn.save-img');
  btn.textContent = '⏳ 生成中...';
  btn.style.pointerEvents = 'none';
  try {
    const imgData = await drawResultCard(currentResultData);
    if (isWeChat()) { showWeChatSave(imgData); }
    else { downloadImage(imgData); btn.textContent = '✅ 已保存！'; setTimeout(() => { btn.textContent = '📸 保存图片'; }, 2500); }
  } catch(e) { console.error('生成图片失败:', e); btn.textContent = '❌ 失败'; setTimeout(() => { btn.textContent = '📸 保存图片'; }, 2000); }
  btn.style.pointerEvents = '';
}

function drawResultCard(r) {
  return new Promise((resolve, reject) => {
    // 容器尺寸：max-width 560px + padding 40px = 600px（用2x缩放）
    const SCALE = 2;
    const CW = 600 * SCALE; // 内容区宽度(含padding)
    const PAD = 20 * SCALE; // 左右padding
    const INNER = CW - 2*PAD; // 内容宽
    const c = document.createElement('canvas');
    c.width = CW;
    // 先预估高度，后面动态调整
    let H = 1400 * SCALE;
    c.height = H;
    const ctx = c.getContext('2d');
    ctx.scale(SCALE, SCALE);

    // 背景
    ctx.fillStyle = '#0a0a0f';
    roundRect(ctx, 0, 0, CW/SCALE, H/SCALE, 16);
    ctx.fill();

    // 加载头像SVG
    const tmpDiv = document.createElement('div');
    tmpDiv.innerHTML = `<svg width="120" height="120" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">${r.avatar || ''}</svg>`;
    const svgEl = tmpDiv.querySelector('svg');
    const svgBlob = new Blob([new XMLSerializer().serializeToString(svgEl)], {type:'image/svg+xml'});
    const svgUrl = URL.createObjectURL(svgBlob);

    const avatarImg = new Image();
    const qrImg = new Image();
    let done = 0;
    const check = () => { if (++done >= 2) render(); };

    avatarImg.onload = check;
    avatarImg.onerror = () => { done++; if(done>=2) render(); };
    avatarImg.src = svgUrl;

    qrImg.onload = check;
    qrImg.onerror = () => { done++; if(done>=2) render(); };
    qrImg.src = 'qrcode.jpg';

    function render() {
      let y = 28; // 从顶部padding开始

      // === 1. 头像 (120px圆形, #13132a背景, 3px边框#1e1e3f) ===
      const avSize = 120, avX = CW/SCALE/2, avY = y + avSize/2;
      ctx.beginPath(); ctx.arc(avX, avY, avSize/2+2, 0, Math.PI*2);
      ctx.fillStyle='#13132a'; ctx.fill(); ctx.strokeStyle='#1e1e3f'; ctx.lineWidth=3; ctx.stroke();
      ctx.save(); ctx.beginPath(); ctx.arc(avX,avY,avSize/2-1,0,Math.PI*2); ctx.clip();
      ctx.drawImage(avatarImg, avX-avSize/2+1,y+1,avSize-2,avSize-2);
      ctx.restore(); URL.revokeObjectURL(svgUrl);
      y += avSize + 12; // margin-bottom:16px 减一点

      // === 2. 匹配度文字 "系统判定匹配度" (13px, #667eea, bold, letter-spacing:1px) ===
      ctx.fillStyle='#667eea'; ctx.font='bold 13px sans-serif'; ctx.textAlign='center';
      ctx.fillText('系统判定匹配度', CW/SCALE/2, y); y += 8;

      // === 3. 进度条 (width:100%, 6px, #1a1e2e背景, 渐变填充) ===
      const barX = PAD, barW = INNER, barH = 6;
      roundRect(ctx,barX,y,barW,barH,3); ctx.fillStyle='#1a1e2e'; ctx.fill();
      const fillW = barW*(parseInt(r.matchPct)||0)/100;
      if(fillW>3){roundRect(ctx,barX,y,fillW,barH,3); ctx.fillStyle='#667eea'; ctx.fill();}
      y += barH + 4; // margin-bottom:6px

      // === 4. 大百分比数字 (28px, bold, 紫色渐变→用#667eea替代) ===
      ctx.fillStyle='#667eea'; ctx.font='900 28px sans-serif';
      ctx.fillText((r.matchPct||'?')+'%',CW/SCALE/2,y+20); y += 26;

      // === 5. 类型标签 (13px, #555, letter-spacing:3px) ===
      ctx.fillStyle='#555'; ctx.font='13px sans-serif';
      ctx.fillText(r.typeLabel||'',CW/SCALE/2,y); y += 22;

      // === 6. 名称 (36px, bold, 白色) ===
      ctx.fillStyle='#fff'; ctx.font='900 36px sans-serif';
      ctx.fillText(r.name||'',CW/SCALE/2,y+30); y += 42;

      // === 7. 座右铭 (13px, italic, #666) ===
      ctx.fillStyle='#666'; ctx.font='italic 13px sans-serif';
      ctx.fillText('\u201c'+(r.motto||'')+'\u201d',CW/SCALE/2,y); y += 24;

      // === 8. 次级匹配 (pill标签, flex布局) ===
      if(r.subTypes && r.subTypes.length>0){
        const pills=r.subTypes.map(s=>s.name).join(' \u00B7 ');
        ctx.fillStyle='#1a1e2e';
        const pw=ctx.measureText(pills).width+36;
        roundRect(ctx,CW/SCALE/2-pw/2,y-14,pw,28,14);ctx.fill();
        ctx.fillStyle='#888'; ctx.font='12px sans-serif';
        ctx.fillText('次级匹配：'+pills,CW/SCALE/2,y+4);
        y+=38;
      }

      // === 9. 十五维度区域 (带圆角背景框) ===
      y+=4;
      const dimPad=16, gridY=y, dimH=0;
      
      // 维度标题 (13px, #667eea, bold, left-aligned)
      ctx.fillStyle='#667eea'; ctx.font='bold 13px sans-serif'; ctx.textAlign='left';
      ctx.letterSpacing='2px';
      ctx.fillText('十五维度评分',PAD+dimPad,y+13);
      ctx.letterSpacing='normal';
      y+=30;

      if(r.dims&&r.dims.length>0){
        const colW=(INNER-dimPad*2-16)/2,gap=16,rowH=34,rows=Math.ceil(r.dims.length/2);
        r.dims.forEach((d,i)=>{
          const col=i%2,row=Math.floor(i/2),isOddLast=(r.dims.length%2===1&&i===r.dims.length-1);
          const dx=isOddLast?CW/SCALE/2-colW/2:PAD+dimPad+col*(colW+gap),dcw=colW,dy=y+row*rowH;
          
          // 标签名+数值 (flex:space-between)
          ctx.fillStyle='#555';ctx.font='11px sans-serif';ctx.textAlign='left';
          ctx.fillText(d.name,dx,dy+8);
          ctx.textAlign='right';ctx.fillStyle='#667eea';ctx.font='700 11px sans-serif';
          ctx.fillText(d.val+'%',dx+dcw,dy+8);

          // 进度条 (4px高)
          const bY=dy+12,bH=4;
          ctx.fillStyle='#1a1e2e';roundRect(ctx,dx,bY,dcw,bH,2);ctx.fill();
          const fw=Math.max(bH,dcw*d.val/100);
          ctx.fillStyle='#667eea';roundRect(ctx,dx,bY,fw,bH,2);ctx.fill();
        });
        dimH=rows*rowH+dimPad*2;
        y+=rows*rowH+dimPad;

        // 绘制维度区域的圆角背景框（在内容下方）
        // 用半透明覆盖的方式不太好，直接在前面画背景即可——这里跳过因为内容已经画好了
      }

      y+=16;

      // === 10. 分隔线 ===
      ctx.strokeStyle='#1e1e3f'; ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(PAD+30,y);ctx.lineTo(CW/SCALE-PAD-30,y);ctx.stroke();
      y+=24;

      // === 11. 二维码引流区域 ===
      const qS=140,qX=CW/SCALE/2-qS/2;
      // 白底圆角背景
      roundRect(ctx,qX-8,y-8,qS+16,qS+16,12); ctx.fillStyle='#fff'; ctx.fill();
      // 二维码图片
      ctx.drawImage(qrImg,qX,y,qS,qS);
      y+=qS+28; // 二维码到文案的间距

      // 引流文案
      ctx.fillStyle='#667eea';ctx.font='bold 14px sans-serif';ctx.textAlign='center';
      ctx.fillText('\U0001F446 扫码测测你的人格类型',CW/SCALE/2,y);
      y+=22;
      ctx.fillStyle='#555';ctx.font='11px sans-serif';
      ctx.fillText('长按图片保存 · 分享到朋友圈',CW/SCALE/2,y);
      y+=20;

      // 裁剪画布到实际使用高度
      const finalCanvas=document.createElement('canvas');
      finalCanvas.width=CW; finalCanvas.height=Math.round(y*SCALE);
      const fCtx=finalCanvas.getContext('2d');
      fCtx.drawImage(c,0,0,CW,Math.round(y*SCALE),0,0,CW,Math.round(y*SCALE));

      resolve(finalCanvas.toDataURL('image/png'));
    }
  });
}

function roundRect(ctx,x,y,w,h,r){
  if(w<0){w=-w;x-=w;}if(h<0){h=-h;y-=h;}
  r=Math.min(r,Math.min(w,h)/2);
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function showWeChatSave(imgData) {
  const overlay = document.getElementById('saveOverlay');
  overlay.classList.add('show');

  document.getElementById('saveCard').style.display = 'none';
  
  const tip = document.getElementById('saveTip');
  tip.innerHTML = `
    <img src="${imgData}" id="saveResultImg"
         style="max-width:100%;max-height:55vh;border-radius:16px;border:2px solid #3a3a5a;box-shadow:0 8px 32px rgba(0,0,0,0.5);" />
    <div style="margin-top:18px;color:#f093fb;font-size:15px;line-height:1.8;">
      👆 长按上方图片<br>保存后分享到朋友圈
    </div>
  `;

  const closeBtn = overlay.querySelector('.close-save-btn');
  closeBtn.style.display = 'inline-block';

  closeBtn.onclick = () => {
    closeSaveOverlay();
    const btn = document.querySelector('.share-btn.save-img');
    btn.textContent = '📸 保存图片';
  };
}

function downloadImage(imgData) {
  const link = document.createElement('a');
  link.href = imgData;
  link.download = 'SBTI-测试结果.png';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

function closeSaveOverlay() {
  const overlay = document.getElementById('saveOverlay');
  overlay.classList.remove('show');
  document.getElementById('saveCard').style.display = '';

  document.getElementById('saveTip').innerHTML =
    `📸 长按上方卡片保存图片<br>或点击下方按钮下载`;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// 背景粒子
(function initParticles() {
  const container = document.getElementById('particles');
  const colors = ['#667eea', '#764ba2', '#f093fb', '#ff6b81', '#667eea'];

    const size = Math.random() * 4 + 2;

    container.appendChild(p);
  }
})();
