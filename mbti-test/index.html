<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MBTI 人格测试 - 探索真实的自己</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --primary:#6C63FF;--primary-light:#8B83FF;--primary-dark:#5A52E0;
    --bg:#0F0E17;--bg2:#1A1932;--bg3:#232244;
    --text:#FFFFFE;--text2:#A7A9BE;--text3:#6B6D8A;
    --accent:#FF6E6C;--accent2:#FFC857;--accent3:#17C3B2;
    --radius:16px;--radius-sm:10px;
  }
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;line-height:1.6}
  
  /* 背景装饰 */
  .bg-decoration{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
  .bg-blob{position:absolute;border-radius:50%;filter:blur(120px);opacity:.15;animation:float 20s ease-in-out infinite}
  .bg-blob:nth-child(1){width:600px;height:600px;background:var(--primary);top:-200px;right:-100px;animation-delay:0s}
  .bg-blob:nth-child(2){width:500px;height:500px;background:var(--accent);bottom:-200px;left:-100px;animation-delay:-7s}
  .bg-blob:nth-child(3){width:400px;height:400px;background:var(--accent3);top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:-14s}
  @keyframes float{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-30px) scale(1.05)}66%{transform:translate(-20px,20px) scale(.95)}}

  /* 主容器 */
  .app{position:relative;z-index:1;max-width:680px;margin:0 auto;padding:20px;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}

  /* === 首页 === */
  .home{text-align:center;animation:fadeUp .8s ease}
  .home-logo{width:120px;height:120px;margin:0 auto 24px;background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:32px;display:flex;align-items:center;justify-content:center;font-size:48px;box-shadow:0 20px 60px rgba(108,99,255,.3)}
  .home h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,var(--text),var(--primary-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:12px;letter-spacing:-1px}
  .home p{color:var(--text2);font-size:1.1rem;margin-bottom:8px;max-width:500px}
  .home .subtitle{font-size:.95rem;color:var(--text3);margin-bottom:40px}
  .home .features{display:flex;gap:16px;margin-bottom:48px;flex-wrap:wrap;justify-content:center}
  .home .feature{background:var(--bg2);border:1px solid rgba(255,255,255,.06);border-radius:var(--radius-sm);padding:16px 20px;text-align:center;flex:1;min-width:140px}
  .home .feature .icon{font-size:1.6rem;margin-bottom:8px}
  .home .feature .label{font-size:.85rem;color:var(--text2)}

  /* 按钮 */
  .btn{display:inline-flex;align-items:center;gap:8px;padding:16px 48px;border:none;border-radius:50px;font-size:1.1rem;font-weight:600;cursor:pointer;transition:all .3s ease;text-decoration:none}
  .btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;box-shadow:0 8px 30px rgba(108,99,255,.4)}
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(108,99,255,.5)}
  .btn-secondary{background:var(--bg2);color:var(--text);border:1px solid rgba(255,255,255,.1)}
  .btn-secondary:hover{background:var(--bg3);border-color:var(--primary)}
  .btn-sm{padding:10px 24px;font-size:.9rem}

  /* === 答题页 === */
  .quiz{width:100%;animation:fadeUp .5s ease}
  .quiz-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px}
  .quiz-progress-wrap{flex:1;margin:0 20px}
  .quiz-progress-bar{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
  .quiz-progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent2));border-radius:3px;transition:width .4s ease}
  .quiz-counter{font-size:.85rem;color:var(--text3);white-space:nowrap;min-width:60px}
  .quiz-counter .current{color:var(--primary-light);font-weight:700;font-size:1rem}
  
  .question-card{background:var(--bg2);border:1px solid rgba(255,255,255,.06);border-radius:var(--radius);padding:40px 32px;margin-bottom:24px;text-align:center;position:relative;overflow:hidden}
  .question-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--primary),var(--accent),var(--accent3))}
  .question-text{font-size:1.25rem;font-weight:600;margin-bottom:36px;color:var(--text)}
  .dimension-badge{display:inline-block;background:rgba(108,99,255,.15);color:var(--primary-light);font-size:.75rem;font-weight:600;padding:4px 12px;border-radius:20px;margin-bottom:16px;letter-spacing:1px}

  /* 滑块选项 */
  .slider-container{max-width:480px;margin:0 auto 32px}
  .slider-labels{display:flex;justify-content:space-between;margin-bottom:12px}
  .slider-labels span{font-size:.9rem;color:var(--text2);flex:1;text-align:center;transition:color .3s}
  .slider-labels span.active{color:var(--primary-light);font-weight:600}
  .slider-track{position:relative;height:56px;display:flex;align-items:center}
  .slider-bg{position:absolute;left:0;right:0;height:8px;background:var(--bg3);border-radius:4px}
  .slider-fill{position:absolute;left:0;height:8px;background:linear-gradient(90deg,var(--primary),var(--accent2));border-radius:4px;transition:all .3s ease}
  input[type="range"]{-webkit-appearance:none;appearance:none;width:100%;height:56px;background:transparent;position:relative;z-index:2;cursor:pointer}
  input[type="range"]::-webkit-slider-runnable-track{height:8px;background:transparent;border-radius:4px}
  input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:32px;height:32px;border-radius:50%;background:#fff;box-shadow:0 2px 10px rgba(0,0,0,.3),0 0 0 4px rgba(108,99,255,.2);cursor:pointer;margin-top:-12px;transition:box-shadow .2s}
  input[type="range"]::-webkit-slider-thumb:hover{box-shadow:0 2px 15px rgba(0,0,0,.4),0 0 0 6px rgba(108,99,255,.3)}
  input[type="range"]::-moz-range-thumb{width:32px;height:32px;border-radius:50%;background:#fff;box-shadow:0 2px 10px rgba(0,0,0,.3),0 0 0 4px rgba(108,99,255,.2);cursor:pointer;border:none}
  .slider-hint{text-align:center;font-size:.8rem;color:var(--text3);margin-bottom:16px;padding:8px 16px;background:rgba(108,99,255,.08);border-radius:20px;display:inline-block}
  .slider-ticks{display:flex;justify-content:space-between;padding:0 10px;margin-bottom:8px}
  .slider-ticks span{width:4px;height:4px;border-radius:50%;background:var(--text3)}

  .quiz-actions{display:flex;gap:12px;justify-content:center}

  /* === 加载页 === */
  .loading{text-align:center;animation:fadeUp .5s ease}
  .loading-spinner{width:80px;height:80px;margin:0 auto 24px;position:relative}
  .loading-spinner::before{content:'';position:absolute;inset:0;border:4px solid var(--bg3);border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading h2{font-size:1.4rem;margin-bottom:8px}
  .loading p{color:var(--text3)}

  /* === 结果页 === */
  .result{width:100%;animation:fadeUp .6s ease}
  .result-header{text-align:center;margin-bottom:40px}
  .result-type{font-size:4rem;font-weight:900;background:linear-gradient(135deg,var(--primary-light),var(--accent),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:4px;margin-bottom:8px;line-height:1.2}
  .result-nickname{font-size:1.3rem;color:var(--accent2);margin-bottom:16px}
  .result-desc{color:var(--text2);max-width:520px;margin:0 auto;line-height:1.8}

  /* 维度分析 */
  .dimensions{margin:32px 0}
  .dimensions h3{font-size:1.1rem;color:var(--text2);margin-bottom:20px;text-align:center}
  .dim-card{background:var(--bg2);border:1px solid rgba(255,255,255,.06);border-radius:var(--radius);padding:18px 20px;margin-bottom:14px}
  .dim-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .dim-pair{display:flex;align-items:center;gap:6px}
  .dim-letter{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:10px;font-weight:800;font-size:.95rem}
  .dim-letter.active{background:rgba(108,99,255,.15);color:var(--primary-light)}
  .dim-letter.inactive{background:var(--bg3);color:var(--text3)}
  .dim-vs{font-size:.7rem;color:var(--text3);font-weight:600;margin:0 2px}
  .dim-pct{font-size:1.2rem;font-weight:800}
  .dim-bar-wrap{position:relative;height:10px;background:var(--bg3);border-radius:5px;overflow:hidden}
  .dim-bar-fill{height:100%;border-radius:5px;transition:width 1s ease}
  .dim-bottom{display:flex;justify-content:space-between;margin-top:8px}
  .dim-trait{font-size:.78rem;color:var(--text3)}
  .dim-trait.active-trait{color:var(--text2);font-weight:600}

  /* 类型分布 */
  .stats-section{background:var(--bg2);border:1px solid rgba(255,255,255,.06);border-radius:var(--radius);padding:28px;margin-top:32px}
  .stats-section h3{font-size:1rem;color:var(--text2);margin-bottom:20px;text-align:center}
  .type-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .type-bar-label{min-width:44px;font-size:.8rem;font-weight:600;color:var(--text2)}
  .type-bar-bg{flex:1;height:20px;background:var(--bg3);border-radius:10px;overflow:hidden}
  .type-bar-fill{height:100%;border-radius:10px;transition:width 1.2s ease}
  .type-bar-count{min-width:40px;font-size:.75rem;color:var(--text3);text-align:right}

  .result-actions{display:flex;gap:12px;justify-content:center;margin-top:36px;flex-wrap:wrap}

  /* 分享卡片 */
  .share-card{background:var(--bg2);border:1px solid rgba(255,255,255,.06);border-radius:var(--radius);padding:28px;text-align:center;margin-top:24px}
  .share-card h4{color:var(--text2);font-size:.9rem;margin-bottom:12px}
  .share-text{background:var(--bg);border-radius:var(--radius-sm);padding:16px;font-size:.9rem;color:var(--text);line-height:1.7;cursor:pointer;transition:border .3s;border:1px solid rgba(255,255,255,.06);position:relative}
  .share-text:hover{border-color:var(--primary)}
  .share-text.copied::after{content:'✓ 已复制';position:absolute;right:12px;top:50%;transform:translateY(-50%);background:var(--primary);color:#fff;padding:4px 10px;border-radius:6px;font-size:.75rem;font-weight:600}

  /* 结果图片弹窗（微信长按保存） */
  .save-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:999;display:flex;align-items:center;justify-content:center;flex-direction:column;padding:20px;animation:fadeIn .3s ease}
  .save-overlay img{max-width:100%;max-height:80vh;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
  .save-overlay .save-tip{color:var(--text2);font-size:.9rem;margin-top:16px;text-align:center}
  .save-overlay .save-close{position:absolute;top:20px;right:20px;background:rgba(255,255,255,.15);border:none;color:#fff;width:36px;height:36px;border-radius:50%;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center}

  /* 隐藏状态 */
  .hidden{display:none!important}

  /* 动画 */
  @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}

  /* 响应式 */
  @media(max-width:600px){
    .app{padding:16px}
    .home h1{font-size:1.8rem}
    .home .features{gap:10px}
    .home .feature{min-width:100px;padding:12px}
    .question-card{padding:24px 16px}
    .question-text{font-size:1.05rem}
    .result-type{font-size:2.8rem;letter-spacing:2px}
    .result-nickname{font-size:1.1rem}
    .result-desc{font-size:.9rem}
    .dim-card{padding:14px 16px}
    .dim-letter{width:30px;height:30px;font-size:.85rem;border-radius:8px}
    .dim-pct{font-size:1rem}
    .dim-bottom{gap:4px}
    .dim-trait{font-size:.72rem}
    .btn{padding:14px 32px;font-size:1rem}
    .share-card{padding:20px}
    .result-actions{flex-direction:column;align-items:stretch}
    .result-actions .btn{justify-content:center}
    .slider-container{max-width:100%}
  }
</style>
</head>
<body>

<div class="bg-decoration">
  <div class="bg-blob"></div>
  <div class="bg-blob"></div>
  <div class="bg-blob"></div>
</div>

<div class="app">
  <!-- 首页 -->
  <div id="page-home" class="home">
    <div class="home-logo">🧠</div>
    <h1>MBTI 人格测试</h1>
    <p>通过 32 道精选问题，发现你的性格密码</p>
    <p class="subtitle">基于 OEJTS 开源量表 · 支持 16 种人格类型<br>每道题选择两个描述中更符合你的一个，约 3 分钟完成</p>
    <div class="features">
      <div class="feature"><div class="icon">⚡</div><div class="label">3 分钟完成</div></div>
      <div class="feature"><div class="icon">🎯</div><div class="label">科学评估</div></div>
      <div class="feature"><div class="icon">📊</div><div class="label">详细分析</div></div>
    </div>
    <button class="btn btn-primary" onclick="startQuiz()">开始测试 →</button>
  </div>

  <!-- 答题页 -->
  <div id="page-quiz" class="quiz hidden">
    <div class="quiz-header">
      <span class="quiz-counter"><span class="current" id="q-current">1</span>/32</span>
      <div class="quiz-progress-wrap">
        <div class="quiz-progress-bar"><div class="quiz-progress-fill" id="progress-fill" style="width:3.125%"></div></div>
      </div>
    </div>
    <div class="question-card">
      <div class="dimension-badge" id="q-dimension">EI 维度</div>
      <div class="question-text" id="q-text">加载中...</div>
      <div class="slider-container">
        <div style="text-align:center"><span class="slider-hint">👈👉 左右滑动圆点，选择更符合你的描述</span></div>
        <div class="slider-labels">
          <span id="q-left" class="active">左侧特质</span>
          <span id="q-right">右侧特质</span>
        </div>
        <div class="slider-track">
          <div class="slider-bg"></div>
          <div class="slider-fill" id="slider-fill" style="width:50%;left:25%"></div>
          <input type="range" id="q-slider" min="1" max="5" value="3" step="1" oninput="onSlide(this)">
        </div>
        <div class="slider-ticks"><span></span><span></span><span></span><span></span><span></span></div>
        <div style="display:flex;justify-content:space-between;font-size:.7rem;color:var(--text3);padding:0 8px">
          <span>非常符合</span>
          <span>中立</span>
          <span>非常符合</span>
        </div>
      </div>
    </div>
    <div class="quiz-actions">
      <button class="btn btn-secondary btn-sm" id="btn-prev" onclick="prevQuestion()">← 上一题</button>
      <button class="btn btn-primary btn-sm" id="btn-next" onclick="nextQuestion()">下一题 →</button>
    </div>
  </div>

  <!-- 加载页 -->
  <div id="page-loading" class="loading hidden">
    <div class="loading-spinner"></div>
    <h2>正在分析你的人格...</h2>
    <p>综合评估四个维度中</p>
  </div>

  <!-- 结果页 -->
  <div id="page-result" class="result hidden"></div>
</div>

<script>
// === 题目数据（中文） ===
const questions = [
  {id:1,dim:"JP",left:"制定清单",right:"依靠记忆"},
  {id:2,dim:"TF",left:"愿意相信",right:"持怀疑态度"},

  {id:16,dim:"SN",left:"融入群体",right:"与众不同"},
  {id:17,dim:"JP",left:"做出承诺",right:"保留选择"},
  {id:18,dim:"TF",left:"想擅长帮助他人",right:"想擅长修理事物"},
  {id:19,dim:"EI",left:"话比较多",right:"更善于倾听"},
  {id:20,dim:"SN",left:"描述发生了什么",right:"描述这意味着什么"},

  {id:22,dim:"TF",left:"跟随内心",right:"跟随理性"},
  {id:23,dim:"EI",left:"喜欢外出活动",right:"喜欢待在家里"},
  {id:24,dim:"SN",left:"想要细节",right:"想要大局观"},
  {id:25,dim:"JP",left:"提前准备",right:"即兴发挥"},
  {id:26,dim:"TF",left:"道德基于同情",right:"道德基于正义"},
  {id:27,dim:"EI",left:"自然而然大声说话",right:"很难大声喊叫"},
  {id:28,dim:"SN",left:"经验主义",right:"理论主义"},
  {id:29,dim:"JP",left:"努力工作",right:"尽情玩乐"},
  {id:30,dim:"TF",left:"重视情感",right:"对情感感到不自在"},
  {id:31,dim:"EI",left:"喜欢表演",right:"避免公开演讲"},
  {id:32,dim:"SN",left:"想知道\"谁/什么/何时\"",right:"想知道\"为什么\""}
];

// === 类型信息 ===
const typeInfo = {
  INTJ:{name:"建筑师",desc:"富有想象力的战略思想家，凡事都有计划。独立、果断，对知识有强烈的渴望，善于将理论转化为可行的计划。"},
  INTP:{name:"逻辑学家",desc:"具有创新精神的发明家，对知识有着永不满足的渴望。善于发现模式和逻辑不一致之处，喜欢解决复杂问题。"},
  ENTJ:{name:"指挥官",desc:"大胆、富有想象力且意志坚强的领导者，总能找到或创造解决方案。天生的领导者，喜欢组织和指挥他人。"},
  ENTP:{name:"辩论家",desc:"聪明好奇的思想者，无法抵抗智力上的挑战。喜欢与人对辩，善于从多个角度看问题。"},

  INFP:{name:"调停者",desc:"诗意、善良的利他主义者，总是热情地为正义的事业提供帮助。内心丰富，追求真实和意义。"},
  ENFJ:{name:"主人公",desc:"富有魅力且鼓舞人心的领导者，能够吸引听众。天生擅长理解和激励他人，善于建立和谐的关系。"},
  ENFP:{name:"竞选者",desc:"热情、有创造力且社交能力强的自由精灵，总能找到微笑的理由。充满热情和创造力，善于发现可能性。"},
  ISTJ:{name:"物流师",desc:"实际且注重事实的个人，可靠性不容怀疑。认真负责、有条理，重视传统和规则。"},
  ISFJ:{name:"守卫者",desc:"非常专注而温暖的守护者，时刻准备着保护所爱的人。忠诚、耐心、善于照顾他人。"},

function showPage(id) {
  document.querySelectorAll('.app > div').forEach(d => d.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

function startQuiz() {
  currentQ = 0;
  answers = {};
  showPage('page-quiz');
  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentQ];
  document.getElementById('q-current').textContent = currentQ + 1;
  document.getElementById('progress-fill').style.width = ((currentQ + 1) / 32 * 100) + '%';
  document.getElementById('q-dimension').textContent = dimNames[q.dim].left + ' / ' + dimNames[q.dim].right;
  document.getElementById('q-text').textContent = q.left + '  还是  ' + q.right + '？';
  document.getElementById('q-left').textContent = q.left;
  document.getElementById('q-right').textContent = q.right;
  
  const slider = document.getElementById('q-slider');
  slider.value = answers[q.id] || 3;
  updateSliderVisual(slider.value);
  
  document.getElementById('btn-prev').style.visibility = currentQ === 0 ? 'hidden' : 'visible';
  document.getElementById('btn-next').textContent = currentQ === 31 ? '查看结果 →' : '下一题 →';
}

function onSlide(el) {
  updateSliderVisual(el.value);
}

function updateSliderVisual(val) {
  const pct = ((val - 1) / 4) * 100;
  const fill = document.getElementById('slider-fill');
  fill.style.width = (100 - pct) + '%';
  fill.style.left = pct * 0.5 + '%';
  
  document.getElementById('q-left').classList.toggle('active', val <= 3);
  document.getElementById('q-right').classList.toggle('active', val >= 3);
}

function prevQuestion() {
  if (currentQ > 0) { currentQ--; renderQuestion(); }
}

function nextQuestion() {
  const q = questions[currentQ];
  answers[q.id] = parseInt(document.getElementById('q-slider').value);
  
  if (currentQ < 31) {
    currentQ++;
    renderQuestion();
  } else {
    showLoading();
  }
}

function showLoading() {
  showPage('page-loading');
  setTimeout(() => {
    showResult();
  }, 2000);
}

function calculateResult() {
  const dimScores = {EI:0,SN:0,TF:0,JP:0};
  
  questions.forEach(q => {
    dimScores[q.dim] += (answers[q.id] || 3);
  });
  
  const type = "";
  const eOrI = dimScores.EI <= 24 ? "E" : "I";
  const sOrN = dimScores.SN <= 24 ? "S" : "N";
  const fOrT = dimScores.TF <= 24 ? "F" : "T"; // TF维度：低分=F，高分=T（反向）
  const jOrP = dimScores.JP <= 24 ? "J" : "P";
  
  return {
    type: eOrI + sOrN + fOrT + jOrP,
    scores: dimScores,
    percentages: {
      EI: Math.round(((24 - dimScores.EI) / 16 + 0.5) * 100),
      SN: Math.round(((24 - dimScores.SN) / 16 + 0.5) * 100),
      TF: Math.round(((dimScores.TF - 24) / 16 + 0.5) * 100),
      JP: Math.round(((24 - dimScores.JP) / 16 + 0.5) * 100)
    }
  };
}

function showResult() {
  const result = calculateResult();
  const info = typeInfo[result.type];
  
  let dimHTML = '';
  dimOrder.forEach(dim => {
    const dn = dimNames[dim];
    const pct = result.percentages[dim];
    const isLeft = pct < 50;
    const dominantPct = isLeft ? Math.round(100 - pct) : Math.round(pct);
    const dominantLetter = isLeft ? dim[0] : dim[1];
    const weakLetter = isLeft ? dim[1] : dim[0];
    
    dimHTML += `
      <div class="dim-card">
        <div class="dim-top">
          <div class="dim-pair">
            <span class="dim-letter ${isLeft?'active':'inactive'}">${dim[0]}</span>
            <span class="dim-vs">VS</span>
            <span class="dim-letter ${isLeft?'inactive':'active'}">${dim[1]}</span>
          </div>
          <span class="dim-pct" style="color:${dn.color}">${dominantPct}%</span>
        </div>
        <div class="dim-bar-wrap">
          <div class="dim-bar-fill" style="width:${dominantPct}%;background:${dn.color}"></div>
        </div>
        <div class="dim-bottom">
          <span class="dim-trait ${isLeft?'active-trait':''}">${dn.left}</span>
          <span class="dim-trait ${isLeft?'':'active-trait'}">${dn.right}</span>
        </div>
      </div>`;
  });

  const shareText = `我在 MBTI 人格测试中的结果是 ${result.type}「${info.name}」\n${info.desc}\n来测测你的人格类型吧！`;

  document.getElementById('page-result').innerHTML = `
    <div class="result-header">
      <div class="result-type">${result.type}</div>
      <div class="result-nickname">「${info.name}」</div>
      <p class="result-desc">${info.desc}</p>
    </div>
    
    <div class="dimensions">
      <h3>维度分析</h3>
      ${dimHTML}
    </div>

    <div class="share-card">
      <h4>📋 点击下方文字即可复制测试结果</h4>
      <div class="share-text" id="share-text-content" onclick="copyResult()">
        ${shareText.replace(/\n/g,'<br>')}
      </div>
    </div>

    <div class="result-actions">
      <button class="btn btn-secondary btn-sm" onclick="startQuiz()">重新测试</button>
      <button class="btn btn-primary btn-sm" onclick="saveAsImage()">📸 保存为图片</button>
    </div>
  `;
  
  showPage('page-result');
}

function copyResult() {
  const text = document.getElementById('share-text-content').innerText.trim();
  const el = document.getElementById('share-text-content');
  
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => {
      el.classList.add('copied');
      setTimeout(() => { el.classList.remove('copied'); }, 2000);
    });
  }
}

async function saveAsImage() {
  const btn = document.querySelector('.result-actions .btn-primary');
  const origText = btn.innerHTML;
  btn.innerHTML = '⏳ 生成中...';
  btn.disabled = true;
  
  try {
    if (typeof html2canvas === 'undefined') {
      const script = document.createElement('script');
      script.src = 'https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';
      document.head.appendChild(script);
      await new Promise((resolve, reject) => {
        script.onload = resolve;
        script.onerror = reject;
      });
    }
    
    // 创建截图专用容器，只包含结果内容（不含按钮）
    const resultEl = document.getElementById('page-result');
    const captureDiv = document.createElement('div');
    captureDiv.style.cssText = 'background:#0F0E17;padding:32px 24px;width:680px;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",sans-serif;';
    
    // 克隆结果内容
    const header = resultEl.querySelector('.result-header').cloneNode(true);
    const dims = resultEl.querySelector('.dimensions').cloneNode(true);
    
    // 创建简化的分享文字（不含标题提示）
    const shareText = document.getElementById('share-text-content').innerText.trim();
    const shareDiv = document.createElement('div');
    shareDiv.style.cssText = 'background:#1A1932;border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:16px;margin-top:20px;text-align:center;';
    shareDiv.innerHTML = `<div style="color:#FFFFFE;font-size:.9rem;line-height:1.7;white-space:pre-wrap;">${shareText.replace(/\n/g,'<br>')}</div>`;
    
    // 修复渐变文字在截图中的显示 - 使用纯色避免渲染问题
    header.querySelectorAll('.result-type').forEach(el => {
      el.style.background = 'none';
      el.style.webkitBackgroundClip = 'unset';
      el.style.webkitTextFillColor = 'unset';
      el.style.color = '#8B83FF';
      el.style.textShadow = '0 2px 20px rgba(139,131,255,.3)';
    });
    
    // 二维码直接使用内嵌的 base64（无需 fetch，彻底避免跨域问题）
    
    // 创建公众号引导区域
    const footer = document.createElement('div');
    footer.style.cssText = 'text-align:center;margin-top:28px;padding-top:24px;border-top:1px solid rgba(255,255,255,.08);';
    footer.innerHTML = `
      <div style="color:#A7A9BE;font-size:.85rem;margin-bottom:10px;">长按识别二维码，关注公众号</div>
      ${QR_BASE64 ? `<img src="${QR_BASE64}" style="width:120px;height:120px;border-radius:12px;background:#1A1932;border:1px solid rgba(255,255,255,.1);margin-bottom:10px;">` : ''}
      <div style="color:#FFFFFE;font-size:1rem;font-weight:700;margin-bottom:10px;">「我与ai的那些事」</div>
      <div style="color:#6B6D8A;font-size:.75rem;">发现更多 AI 趣味工具和玩法</div>
    `;
    
    captureDiv.appendChild(header);
    captureDiv.appendChild(dims);
    captureDiv.appendChild(shareDiv);
    captureDiv.appendChild(footer);
    
    // 临时添加到页面外进行截图
    captureDiv.style.position = 'fixed';
    captureDiv.style.left = '-9999px';
    captureDiv.style.top = '0';
    document.body.appendChild(captureDiv);
    
    // 等渲染完成
    await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
    
    const canvas = await html2canvas(captureDiv, {
      backgroundColor: '#0F0E17',
      scale: 2,
      useCORS: true,
      logging: false
    });
    
    // 移除临时元素
    document.body.removeChild(captureDiv);
    
    const dataURL = canvas.toDataURL('image/png');
    
    // 检测是否在微信内置浏览器中
    const isWechat = /MicroMessenger/i.test(navigator.userAgent);
    
    if (isWechat) {
      // 微信环境：弹出图片，用户长按保存
      const overlay = document.createElement('div');
      overlay.className = 'save-overlay';
      overlay.innerHTML = `
        <button class="save-close" onclick="this.parentElement.remove()">✕</button>
        <img src="${dataURL}">
        <div class="save-tip">👆 长按图片即可保存到相册</div>
      `;
      overlay.addEventListener('click', (e) => {
        if (e.target === overlay) overlay.remove();
      });
      document.body.appendChild(overlay);
    } else {
      // 普通浏览器：直接下载
      const link = document.createElement('a');
      link.download = 'MBTI-' + document.querySelector('.result-type').textContent + '.png';
      link.href = dataURL;
      link.click();
    }
    
    btn.innerHTML = isWechat ? '✅ 图片已生成' : '✅ 已保存';
    setTimeout(() => { btn.innerHTML = origText; }, 2000);
  } catch (err) {
    btn.innerHTML = origText;
    alert('保存图片失败，请尝试手动截图分享');
  }
  btn.disabled = false;
}

// 初始化滑块
document.addEventListener('DOMContentLoaded', () => {
  const slider = document.getElementById('q-slider');
  slider.value = 3;
  updateSliderVisual(3);
});
</script>
